[workspace]
members = [
    "crates/mcp-gateway",
    "crates/mcp-conformance",
    "crates/mcp-contract",
    "crates/mcp-stdio-bridge",
    "crates/media-mcp",
    "crates/smoke",
    "crates/timeseries-mcp",
]
resolver = "3"

[workspace.metadata]
name = "veoveo"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
anyhow = "1.0.103"
axum = "0.8.9"
axum-server = { version = "0.8.0", features = ["tls-rustls-no-provider"] }
base64 = "0.22.1"
chrono = { version = "0.4.45", default-features = false, features = ["serde", "clock"] }
clap = { version = "4.6.1", features = ["derive", "env"] }
dotenvy = "0.15.7"
duckdb = { git = "https://github.com/rozgo/duckdb-rs.git", rev = "e2f3d156223250827567d154035e670432d97ac9", features = ["chrono"] }
futures = "0.3.32"
hex = "0.4.3"
hmac = "0.13.0"
jsonschema = "0.46.9"
jsonwebtoken = { version = "10.4.0", default-features = false, features = ["rust_crypto"] }
object_store = { version = "0.14.0", default-features = false, features = ["aws"] }
opentelemetry = "0.32.0"
opentelemetry-appender-tracing = "0.32.0"
opentelemetry-otlp = { version = "0.32.0", default-features = false, features = ["http-proto", "reqwest-blocking-client", "trace", "logs"] }
opentelemetry_sdk = "0.32.1"
parking_lot = "0.12.5"
reqwest = { version = "0.13.4", default-features = false }
rcgen = "0.14.8"
re_sdk = "0.34.0"
re_sdk_types = "0.34.0"
rmcp = "2.1.0"
rustls = { version = "0.23.41", default-features = false, features = ["ring", "std", "tls12"] }
schemars = "1.2.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
secrecy = "0.10.3"
sha2 = "0.11.0"
sqlx = { version = "0.9.0", default-features = false, features = ["runtime-tokio", "tls-rustls-ring-webpki", "postgres", "chrono", "json", "uuid", "migrate", "macros"] }
tokio = "1.52.3"
tokio-util = "0.7.18"
tower-http = { version = "0.7.0", features = ["fs", "trace", "cors"] }
tracing = "0.1.44"
tracing-opentelemetry = "0.33.0"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "json"] }
url = "2.5.8"
uuid = { version = "1.23.4", features = ["v4"] }
vaultrs = { version = "0.8.0", default-features = false, features = ["rustls"] }
veoveo-mcp-contract = { path = "crates/mcp-contract", default-features = false }
