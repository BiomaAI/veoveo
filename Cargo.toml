[workspace]
members = [
    "crates/mcp-gateway",
    "crates/mcp-contract",
    "crates/media-mcp",
]
resolver = "3"

[workspace.metadata]
name = "veoveo"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
anyhow = "1.0.103"
axum = "0.8.9"
axum-server = { version = "0.8.0", features = ["tls-rustls"] }
base64 = "0.22.1"
chrono = { version = "0.4.45", default-features = false, features = ["serde", "clock"] }
clap = { version = "4.6.1", features = ["derive", "env"] }
dotenvy = "0.15.7"
duckdb = { version = "1.10504.0", features = ["chrono"] }
futures = "0.3.32"
hex = "0.4.3"
hmac = "0.13.0"
jsonschema = "0.46.8"
jsonwebtoken = { version = "10.4.0", default-features = false, features = ["rust_crypto"] }
object_store = { version = "0.14.0", default-features = false, features = ["aws"] }
reqwest = { version = "0.13.4", default-features = false }
rcgen = "0.14.8"
rmcp = "2.0.0"
schemars = "1.2.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.11.0"
tokio = "1.52.3"
tokio-util = "0.7.18"
tower-http = { version = "0.7.0", features = ["fs", "trace", "cors"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "json"] }
url = "2.5.8"
uuid = { version = "1.23.4", features = ["v4"] }
veoveo-mcp-contract = { path = "crates/mcp-contract", default-features = false }
