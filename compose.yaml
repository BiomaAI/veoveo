x-app-security: &app-security
  read_only: true
  cap_drop: [ALL]
  security_opt: [no-new-privileges:true]
  pids_limit: 512
  restart: unless-stopped

x-surreal-runtime: &surreal-runtime
  VEOVEO_SURREAL_ENDPOINT: ws://surrealdb:8000
  VEOVEO_SURREAL_NAMESPACE: ${VEOVEO_SURREAL_NAMESPACE:-veoveo}
  VEOVEO_SURREAL_DATABASE: ${VEOVEO_SURREAL_DATABASE:-platform}
  VEOVEO_SURREAL_AUTH_LEVEL: database
  VEOVEO_SURREAL_USERNAME: ${VEOVEO_SURREAL_RUNTIME_USERNAME:?set VEOVEO_SURREAL_RUNTIME_USERNAME}
  VEOVEO_SURREAL_PASSWORD: ${VEOVEO_SURREAL_RUNTIME_PASSWORD:?set VEOVEO_SURREAL_RUNTIME_PASSWORD}

x-service-env: &service-env
  <<: *surreal-runtime
  PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://veoveo.example}
  VEOVEO_CONNECTIVITY_MODE: ${VEOVEO_CONNECTIVITY_MODE:-connected}
  VEOVEO_INTERNAL_TRUST_JWKS: ${VEOVEO_INTERNAL_TRUST_JWKS:?set VEOVEO_INTERNAL_TRUST_JWKS}
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318

services:
  surrealdb-permissions:
    image: alpine:3.20.3
    user: root
    command: [chown, -R, 65532:65532, /data]
    volumes:
      - surrealdb_data:/data
    restart: "no"

  surrealdb:
    image: surrealdb/surrealdb:v3.2.0
    depends_on:
      surrealdb-permissions:
        condition: service_completed_successfully
    command:
      - start
      - --bind
      - 0.0.0.0:8000
      - --user
      - ${VEOVEO_SURREAL_ADMIN_USERNAME:-root}
      - --pass
      - ${VEOVEO_SURREAL_ADMIN_PASSWORD:?set VEOVEO_SURREAL_ADMIN_PASSWORD}
      - rocksdb:/data/veoveo.db
    user: nonroot
    volumes:
      - surrealdb_data:/data
    ports:
      - 127.0.0.1:8000:8000
    healthcheck:
      test: [CMD, /surreal, isready, --endpoint, http://127.0.0.1:8000]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 3s
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    restart: unless-stopped

  rustfs-permissions:
    image: alpine:3.20.3
    user: root
    command: [chown, -R, 10001:10001, /data]
    volumes:
      - rustfs_data:/data
    restart: "no"

  recording-spool-permissions:
    image: alpine:3.20.3
    user: root
    command: [chown, -R, 10001:10001, /recordings]
    volumes:
      - recording_spool:/recordings
    restart: "no"

  rustfs:
    image: rustfs/rustfs:1.0.0-beta.8
    depends_on:
      rustfs-permissions:
        condition: service_completed_successfully
    command: [/data]
    environment:
      RUSTFS_ACCESS_KEY: ${VEOVEO_OBJECT_STORE_ACCESS_KEY:?set VEOVEO_OBJECT_STORE_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${VEOVEO_OBJECT_STORE_SECRET_KEY:?set VEOVEO_OBJECT_STORE_SECRET_KEY}
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs_data:/data
    ports:
      - 127.0.0.1:9000:9000
      - 127.0.0.1:9001:9001
    healthcheck:
      test: [CMD, /usr/bin/curl, -fsS, http://127.0.0.1:9000/health]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    restart: unless-stopped

  rustfs-init:
    image: amazon/aws-cli:2.17.45
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: [/bin/sh, -ec]
    command:
      - |
        until aws --endpoint-url http://rustfs:9000 s3api head-bucket --bucket artifact-plane 2>/dev/null; do
          aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket artifact-plane && break
          sleep 2
        done
    environment:
      AWS_ACCESS_KEY_ID: ${VEOVEO_OBJECT_STORE_ACCESS_KEY:?set VEOVEO_OBJECT_STORE_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${VEOVEO_OBJECT_STORE_SECRET_KEY:?set VEOVEO_OBJECT_STORE_SECRET_KEY}
      AWS_DEFAULT_REGION: us-east-1
      AWS_PAGER: ""
    restart: "no"

  otel-collector:
    image: otel/opentelemetry-collector:0.155.0
    command: [--config=/etc/otelcol/config.yaml]
    volumes:
      - ./configs/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - 127.0.0.1:4317:4317
      - 127.0.0.1:4318:4318
    restart: unless-stopped

  installation-bootstrap:
    image: veoveo/mcp-gateway:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: platform/gateway/Dockerfile
    depends_on:
      surrealdb:
        condition: service_healthy
    command:
      - installation-bootstrap
      - --control-plane
      - /etc/veoveo/gateway.json
      - --applied-by
      - compose-installation-bootstrap
    environment:
      VEOVEO_SURREAL_ENDPOINT: ws://surrealdb:8000
      VEOVEO_SURREAL_NAMESPACE: ${VEOVEO_SURREAL_NAMESPACE:-veoveo}
      VEOVEO_SURREAL_DATABASE: ${VEOVEO_SURREAL_DATABASE:-platform}
      VEOVEO_SURREAL_AUTH_LEVEL: root
      VEOVEO_SURREAL_USERNAME: ${VEOVEO_SURREAL_ADMIN_USERNAME:-root}
      VEOVEO_SURREAL_PASSWORD: ${VEOVEO_SURREAL_ADMIN_PASSWORD:?set VEOVEO_SURREAL_ADMIN_PASSWORD}
      VEOVEO_SURREAL_RUNTIME_USERNAME: ${VEOVEO_SURREAL_RUNTIME_USERNAME:?set VEOVEO_SURREAL_RUNTIME_USERNAME}
      VEOVEO_SURREAL_RUNTIME_PASSWORD: ${VEOVEO_SURREAL_RUNTIME_PASSWORD:?set VEOVEO_SURREAL_RUNTIME_PASSWORD}
    volumes:
      - ./configs/gateway.local.json:/etc/veoveo/gateway.json:ro
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs: [/tmp]
    restart: "no"

  artifact-service:
    <<: *app-security
    image: veoveo/artifact-service:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: platform/artifacts/service/Dockerfile
    depends_on:
      installation-bootstrap:
        condition: service_completed_successfully
      rustfs-init:
        condition: service_completed_successfully
    environment:
      <<: *surreal-runtime
      ARTIFACT_SERVICE_BIND: 0.0.0.0:8790
      ARTIFACT_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://veoveo.example}
      ARTIFACT_ALLOWED_AUDIENCES: artifact,media,timeseries,optimization,duckdb,frames,map,recording,perception,sumo,datasheet
      ARTIFACT_STORE: s3
      ARTIFACT_S3_ENDPOINT: http://rustfs:9000
      ARTIFACT_S3_PUBLIC_ENDPOINT: ${ARTIFACT_S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      ARTIFACT_S3_BUCKET: artifact-plane
      ARTIFACT_S3_REGION: us-east-1
      ARTIFACT_S3_ACCESS_KEY_ID: ${VEOVEO_OBJECT_STORE_ACCESS_KEY:?set VEOVEO_OBJECT_STORE_ACCESS_KEY}
      ARTIFACT_S3_SECRET_ACCESS_KEY: ${VEOVEO_OBJECT_STORE_SECRET_KEY:?set VEOVEO_OBJECT_STORE_SECRET_KEY}
      ARTIFACT_S3_ALLOW_HTTP: "true"
      VEOVEO_INTERNAL_TRUST_JWKS: ${VEOVEO_INTERNAL_TRUST_JWKS:?set VEOVEO_INTERNAL_TRUST_JWKS}
      OTEL_SERVICE_NAME: veoveo-artifact-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      RUST_LOG: info,veoveo_artifact_service=debug
    tmpfs: [/tmp]
    ports:
      - 127.0.0.1:8790:8790
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8790/readyz]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  artifact-mcp:
    <<: *app-security
    image: veoveo/artifact-mcp:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: servers/artifact-mcp/Dockerfile
    depends_on:
      artifact-service:
        condition: service_healthy
    command:
      - --port
      - "8794"
      - --public-base-url
      - ${PUBLIC_BASE_URL:-https://veoveo.example}
      - --allowed-host
      - artifact-mcp:8794
      - --artifact-service-url
      - http://artifact-service:8790
    environment:
      <<: *service-env
      OTEL_SERVICE_NAME: veoveo-artifact-mcp
      RUST_LOG: info,veoveo_artifact_mcp=debug
    tmpfs: [/tmp]
    ports:
      - 127.0.0.1:8794:8794
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8794/artifact/healthz]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  recording-hub:
    <<: *app-security
    image: veoveo/recording-hub:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: platform/recordings/hub/Dockerfile
    depends_on:
      installation-bootstrap:
        condition: service_completed_successfully
      recording-spool-permissions:
        condition: service_completed_successfully
    command:
      - spooler
      - --bind
      - 0.0.0.0:9876
      - --spool-dir
      - /recordings
      - --route
      - world=
      - --rerun-bin
      - /usr/local/bin/rerun
    environment:
      <<: *surreal-runtime
      RECORDING_TENANT_KEY: ${RECORDING_TENANT_KEY:-enterprise}
      RECORDING_OWNER_KEY: recording-hub
      RECORDING_OWNER_ISSUER: https://veoveo.local/services
      RECORDING_OWNER_SUBJECT: recording-hub
      RECORDING_CLASSIFICATION: ${RECORDING_CLASSIFICATION:-unclassified}
      OTEL_SERVICE_NAME: veoveo-recording-hub
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      RUST_LOG: info,veoveo_recording_hub=debug
    volumes:
      - recording_spool:/recordings
    tmpfs: [/tmp]
    expose: ["9876"]
    healthcheck:
      test: [CMD, nc, -z, 127.0.0.1, "9876"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  recording-mcp:
    <<: *app-security
    image: veoveo/recording-mcp:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: servers/recording-mcp/Dockerfile
    depends_on:
      artifact-service:
        condition: service_healthy
      recording-hub:
        condition: service_healthy
    command:
      - --port
      - "8796"
      - --spool-dir
      - /recordings
      - --allowed-host
      - recording-mcp:8796
      - --artifact-service-url
      - http://artifact-service:8790
    environment:
      <<: *service-env
      OTEL_SERVICE_NAME: veoveo-recording-mcp
      RUST_LOG: info,veoveo_recording_mcp=debug
    volumes:
      - recording_spool:/recordings:ro
    tmpfs: [/tmp]
    ports:
      - 127.0.0.1:8796:8796
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8796/readyz]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  perception-mcp:
    <<: *app-security
    image: veoveo/perception-mcp:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: servers/perception-mcp/Dockerfile
    depends_on:
      artifact-service:
        condition: service_healthy
      recording-hub:
        condition: service_healthy
    command:
      - --port
      - "8797"
      - --public-base-url
      - ${PUBLIC_BASE_URL:-https://veoveo.example}
      - --allow-loopback-hosts
      - --spool-dir
      - /recordings
      - --recording-proxy-uri
      - rerun+http://recording-hub:9876/proxy
      - --pipeline-catalog
      - /etc/veoveo/perception/catalog.json
      - --deepstream-runner
      - /usr/local/bin/perception-deepstream-runner
      - --allowed-host
      - perception-mcp:8797
      - --artifact-service-url
      - http://artifact-service:8790
    environment:
      <<: *service-env
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
      GST_REGISTRY: /tmp/gstreamer-registry.bin
      CUDA_CACHE_PATH: /tmp/cuda-cache
      HOME: /tmp
      OTEL_SERVICE_NAME: veoveo-perception-mcp
      RUST_LOG: info,veoveo_perception_mcp=debug
    gpus: all
    volumes:
      - recording_spool:/recordings:ro
      - ${PERCEPTION_CONFIG_DIR:?set PERCEPTION_CONFIG_DIR}:/etc/veoveo/perception:ro
      - ${PERCEPTION_MODEL_DIR:?set PERCEPTION_MODEL_DIR}:/models:ro
    tmpfs: [/tmp]
    ports:
      - 127.0.0.1:8797:8797
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8797/perception/readyz]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 20s

  media-mcp:
    <<: *app-security
    image: veoveo/media-mcp:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: servers/media-mcp/Dockerfile
    depends_on:
      artifact-service:
        condition: service_healthy
    command:
      - --port
      - "8787"
      - --public-base-url
      - ${PUBLIC_BASE_URL:-https://veoveo.example}
      - --static-dir
      - /app/assets
      - --allow-loopback-hosts
      - --allowed-host
      - media-mcp:8787
      - --artifact-service-url
      - http://artifact-service:8790
    environment:
      <<: *service-env
      MEDIA_PROVIDER_API_KEY: ${MEDIA_PROVIDER_API_KEY:?set MEDIA_PROVIDER_API_KEY}
      MEDIA_PROVIDER_WEBHOOK_SECRET: ${MEDIA_PROVIDER_WEBHOOK_SECRET:?set MEDIA_PROVIDER_WEBHOOK_SECRET}
      OTEL_SERVICE_NAME: veoveo-media-mcp
      RUST_LOG: info,veoveo_media_mcp=debug
    volumes:
      - ./assets:/app/assets:ro
    tmpfs: [/tmp]
    ports:
      - 127.0.0.1:8787:8787
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8787/healthz]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  timeseries-mcp:
    <<: *app-security
    image: veoveo/timeseries-mcp:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: servers/timeseries-mcp/Dockerfile
    depends_on:
      artifact-service:
        condition: service_healthy
    command:
      - --port
      - "8789"
      - --public-base-url
      - ${PUBLIC_BASE_URL:-https://veoveo.example}
      - --allow-loopback-hosts
      - --allowed-host
      - timeseries-mcp:8789
      - --artifact-service-url
      - http://artifact-service:8790
      - --max-artifact-bytes
      - "536870912"
    environment:
      <<: *service-env
      OTEL_SERVICE_NAME: veoveo-timeseries-mcp
      RUST_LOG: info,veoveo_timeseries_mcp=debug
    tmpfs: [/tmp]
    ports:
      - 127.0.0.1:8789:8789
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8789/healthz]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  optimization-mcp:
    <<: *app-security
    image: veoveo/optimization-mcp:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: servers/optimization-mcp/Dockerfile
    depends_on:
      artifact-service:
        condition: service_healthy
    command:
      - --port
      - "8792"
      - --public-base-url
      - ${PUBLIC_BASE_URL:-https://veoveo.example}
      - --allow-loopback-hosts
      - --allowed-host
      - optimization-mcp:8792
      - --artifact-service-url
      - http://artifact-service:8790
    environment:
      <<: *service-env
      OTEL_SERVICE_NAME: veoveo-optimization-mcp
      RUST_LOG: info,veoveo_optimization_mcp=debug
    tmpfs: [/tmp, /run/veoveo]
    ports:
      - 127.0.0.1:8792:8792
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8792/healthz]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  frames-mcp:
    <<: *app-security
    image: veoveo/frames-mcp:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: servers/frames-mcp/Dockerfile
    depends_on:
      artifact-service:
        condition: service_healthy
    command:
      - --port
      - "8793"
      - --public-base-url
      - ${PUBLIC_BASE_URL:-https://veoveo.example}
      - --allow-loopback-hosts
      - --allowed-host
      - frames-mcp:8793
      - --artifact-service-url
      - http://artifact-service:8790
      - --max-artifact-bytes
      - "67108864"
    environment:
      <<: *service-env
      OTEL_SERVICE_NAME: veoveo-frames-mcp
      RUST_LOG: info,veoveo_frames_mcp=debug
    tmpfs: [/tmp]
    ports:
      - 127.0.0.1:8793:8793
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8793/frames/healthz]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  map-mcp:
    <<: *app-security
    image: veoveo/map-mcp:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: servers/map-mcp/Dockerfile
    depends_on:
      artifact-service:
        condition: service_healthy
    command:
      - --port
      - "8799"
      - --public-base-url
      - ${PUBLIC_BASE_URL:-https://veoveo.example}
      - --allow-loopback-hosts
      - --allowed-host
      - map-mcp:8799
      - --artifact-service-url
      - http://artifact-service:8790
      - --map-database
      - /var/lib/veoveo/map/catalog.duckdb
      - --acquisition-scratch-root
      - /var/lib/veoveo/map/acquisitions
      - --source-mount-root
      - /data/map-sources
      - --max-artifact-bytes
      - "536870912"
      - --max-routing-expanded-bytes
      - "17179869184"
    environment:
      <<: *service-env
      OTEL_SERVICE_NAME: veoveo-map-mcp
      RUST_LOG: info,veoveo_map_mcp=debug
    volumes:
      - map-data:/var/lib/veoveo/map
      - map-source-exchange:/data/map-sources:ro
    tmpfs: [/tmp, /run/secrets/map]
    ports:
      - 127.0.0.1:8799:8799
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8799/map/healthz]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s

  duckdb-mcp:
    <<: *app-security
    image: veoveo/duckdb-mcp:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: servers/duckdb-mcp/Dockerfile
    depends_on:
      artifact-service:
        condition: service_healthy
    command:
      - --port
      - "8791"
      - --public-base-url
      - ${PUBLIC_BASE_URL:-https://veoveo.example}
      - --allow-loopback-hosts
      - --allowed-host
      - duckdb-mcp:8791
      - --database-dir
      - /var/lib/veoveo/duckdb/databases
      - --exchange-dir
      - /var/lib/veoveo/duckdb/exchange
      - --spill-dir
      - /var/lib/veoveo/duckdb/spill
      - --spatial-extension
      - /usr/local/lib/duckdb/extensions/spatial.duckdb_extension
      - --artifact-service-url
      - http://artifact-service:8790
      - --max-artifact-bytes
      - "536870912"
    environment:
      <<: *service-env
      OTEL_SERVICE_NAME: veoveo-duckdb-mcp
      RUST_LOG: info,veoveo_duckdb_mcp=debug
    mem_limit: 2g
    tmpfs:
      - /tmp
      - /var/lib/veoveo/duckdb/exchange:uid=10001,gid=10001
      - /var/lib/veoveo/duckdb/spill:uid=10001,gid=10001
    volumes:
      - duckdb_workspaces:/var/lib/veoveo/duckdb/databases
    ports:
      - 127.0.0.1:8791:8791
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8791/healthz]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  datasheet-mcp:
    <<: *app-security
    image: veoveo/datasheet-mcp:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: templates/python-mcp/Dockerfile
    depends_on:
      artifact-service:
        condition: service_healthy
    command:
      - --port
      - "8798"
      - --public-base-url
      - ${PUBLIC_BASE_URL:-https://veoveo.example}
      - --allow-loopback-hosts
      - --allowed-host
      - datasheet-mcp:8798
      - --artifact-service-url
      - http://artifact-service:8790
      - --max-artifact-bytes
      - "67108864"
      - --surreal-auth-level
      - database
    environment:
      <<: *service-env
      OTEL_SERVICE_NAME: veoveo-datasheet-mcp
    tmpfs: [/tmp]
    ports:
      - 127.0.0.1:8798:8798
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8798/datasheet/readyz]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  chart-mcp:
    <<: *app-security
    image: veoveo/chart-mcp:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: servers/chart-mcp/Dockerfile
    command:
      - --transport
      - http
      - --host
      - 0.0.0.0
      - --port
      - "8795"
      - --path
      - /mcp
      - --allowed-hosts
      - chart-mcp:8795,localhost:8795,127.0.0.1:8795
      - --disable-file-reference
    environment:
      OTEL_SERVICE_NAME: chart-mcp
    mem_limit: 512m
    tmpfs: [/tmp]
    ports:
      - 127.0.0.1:8795:8795
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8795/health]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  rerun-bridge:
    <<: *app-security
    image: veoveo/mcp-stdio-bridge:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: mcp/bridges/stdio/Dockerfile
    command:
      - --listen
      - 0.0.0.0:8790
      - --allowed-host
      - rerun-bridge:8790,localhost:8790,127.0.0.1:8790
      - --
      - rerun
      - viewer-mcp
    environment:
      RUST_LOG: info
    tmpfs: [/tmp]
    ports:
      - 127.0.0.1:9876:9876
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8790/healthz]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s

  mcp-gateway:
    <<: *app-security
    image: veoveo/mcp-gateway:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: platform/gateway/Dockerfile
    depends_on:
      installation-bootstrap:
        condition: service_completed_successfully
      artifact-mcp:
        condition: service_healthy
      recording-mcp:
        condition: service_healthy
      perception-mcp:
        condition: service_healthy
      media-mcp:
        condition: service_healthy
      timeseries-mcp:
        condition: service_healthy
      optimization-mcp:
        condition: service_healthy
      frames-mcp:
        condition: service_healthy
      map-mcp:
        condition: service_healthy
      duckdb-mcp:
        condition: service_healthy
      datasheet-mcp:
        condition: service_healthy
      chart-mcp:
        condition: service_healthy
      rerun-bridge:
        condition: service_healthy
    command:
      - serve
      - --port
      - "8788"
      - --public-base-url
      - ${PUBLIC_BASE_URL:-https://veoveo.example}
      - --artifact-service-url
      - http://artifact-service:8790
      - --allow-loopback-hosts
      - --audit-event-retention-days
      - "365"
    environment:
      <<: *surreal-runtime
      VEOVEO_IDP_OIDC_CLIENT_SECRET: ${VEOVEO_IDP_OIDC_CLIENT_SECRET:?set VEOVEO_IDP_OIDC_CLIENT_SECRET}
      VEOVEO_INTERNAL_SIGNING_KEY_DER_B64: ${VEOVEO_INTERNAL_SIGNING_KEY_DER_B64:?set VEOVEO_INTERNAL_SIGNING_KEY_DER_B64}
      VEOVEO_INTERNAL_SIGNING_KEY_ID: ${VEOVEO_INTERNAL_SIGNING_KEY_ID:-veoveo-internal-1}
      VEOVEO_AUTHORIZATION_SERVER_PRIVATE_KEY_DER_B64: ${VEOVEO_AUTHORIZATION_SERVER_PRIVATE_KEY_DER_B64:?set VEOVEO_AUTHORIZATION_SERVER_PRIVATE_KEY_DER_B64}
      VEOVEO_REFRESH_DELIVERY_KEY_B64: ${VEOVEO_REFRESH_DELIVERY_KEY_B64:?set VEOVEO_REFRESH_DELIVERY_KEY_B64}
      VEOVEO_REFRESH_DELIVERY_WINDOW_SECONDS: ${VEOVEO_REFRESH_DELIVERY_WINDOW_SECONDS:-5}
      OTEL_SERVICE_NAME: veoveo-mcp-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      RUST_LOG: info,veoveo_mcp_gateway=debug
    tmpfs: [/tmp, /run/veoveo]
    ports:
      - 127.0.0.1:8788:8788
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8788/readyz]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  console-bff:
    <<: *app-security
    image: veoveo/console-bff:${VEOVEO_IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: apps/console/bff/Dockerfile
    depends_on:
      mcp-gateway:
        condition: service_healthy
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://veoveo.example}
      PORT: "8786"
      VEOVEO_GATEWAY_URL: http://mcp-gateway:8788
      VEOVEO_CONSOLE_OAUTH_CLIENT_ID: ${VEOVEO_CONSOLE_OAUTH_CLIENT_ID:-admin-console}
      VEOVEO_CONSOLE_OAUTH_RESOURCE: ${VEOVEO_CONSOLE_OAUTH_RESOURCE:?set VEOVEO_CONSOLE_OAUTH_RESOURCE}
      VEOVEO_CONSOLE_SESSION_KEY: ${VEOVEO_CONSOLE_SESSION_KEY:?set VEOVEO_CONSOLE_SESSION_KEY}
      OTEL_SERVICE_NAME: veoveo-console-bff
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    tmpfs: [/tmp]
    ports:
      - 127.0.0.1:8786:8786
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8786/healthz]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  edge:
    image: caddy:2.11.2
    depends_on:
      console-bff:
        condition: service_healthy
      mcp-gateway:
        condition: service_healthy
      artifact-service:
        condition: service_healthy
    volumes:
      - ./configs/Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - 127.0.0.1:8780:8080
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs: [/config, /data, /tmp]
    restart: unless-stopped

volumes:
  surrealdb_data:
  rustfs_data:
  duckdb_workspaces:
  recording_spool:
  map-data:
  map-source-exchange:
