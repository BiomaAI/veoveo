services:
  rustfs-perms:
    image: alpine:3.20
    user: root
    volumes:
      - rustfs_data:/data
    command: chown -R 10001:10001 /data
    profiles:
      - dev

  rustfs:
    image: rustfs/rustfs:1.0.0-beta.8
    depends_on:
      rustfs-perms:
        condition: service_completed_successfully
    command: ["/data"]
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    profiles:
      - dev

  rustfs-init:
    image: amazon/aws-cli:latest
    depends_on:
      rustfs:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until aws --endpoint-url http://rustfs:9000 s3api head-bucket --bucket media-artifacts 2>/dev/null \
          || aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket media-artifacts; do
          sleep 2
        done
    environment:
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_DEFAULT_REGION: us-east-1
      AWS_PAGER: ""
    profiles:
      - dev

  media-mcp:
    build:
      context: .
      dockerfile: crates/media-mcp/Dockerfile
    depends_on:
      rustfs-init:
        condition: service_completed_successfully
    command:
      - "--port"
      - "8787"
      - "--public-base-url"
      - "${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}"
      - "--static-dir"
      - "/app/assets"
      - "--state-db"
      - "/var/lib/veoveo/media/state.duckdb"
      - "--artifact-endpoint"
      - "http://rustfs:9000"
      - "--artifact-bucket"
      - "media-artifacts"
      - "--artifact-region"
      - "us-east-1"
    environment:
      MEDIA_PROVIDER_API_KEY: "${MEDIA_PROVIDER_API_KEY:?set MEDIA_PROVIDER_API_KEY}"
      MEDIA_PROVIDER_WEBHOOK_SECRET: "${MEDIA_PROVIDER_WEBHOOK_SECRET:-}"
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./assets:/app/assets:ro
      - media_state:/var/lib/veoveo/media
    ports:
      - "8787:8787"
    profiles:
      - dev

  mcp-gateway:
    build:
      context: .
      dockerfile: crates/mcp-gateway/Dockerfile
    depends_on:
      - media-mcp
    command:
      - "serve"
      - "--port"
      - "8788"
      - "--public-base-url"
      - "${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}"
      - "--control-plane"
      - "/etc/veoveo/gateway.json"
      - "--state-db"
      - "/var/lib/veoveo/gateway/state.duckdb"
    volumes:
      - ./configs/gateway.local.json:/etc/veoveo/gateway.json:ro
      - gateway_state:/var/lib/veoveo/gateway
    ports:
      - "8788:8788"
    profiles:
      - dev

volumes:
  rustfs_data:
  media_state:
  gateway_state:
