services:
  rustfs-perms:
    image: alpine:3.20
    user: root
    volumes:
      - rustfs_data:/data
    command: chown -R 10001:10001 /data
    profiles:
      - dev

  rustfs:
    image: rustfs/rustfs:1.0.0-beta.8
    depends_on:
      rustfs-perms:
        condition: service_completed_successfully
    command: ["/data"]
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    profiles:
      - dev

  rustfs-init:
    image: amazon/aws-cli:latest
    depends_on:
      rustfs:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for bucket in artifact-plane; do
          until aws --endpoint-url http://rustfs:9000 s3api head-bucket --bucket "$$bucket" 2>/dev/null \
            || aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket "$$bucket"; do
            sleep 2
          done
        done
    environment:
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_DEFAULT_REGION: us-east-1
      AWS_PAGER: ""
    profiles:
      - dev

  otel-collector:
    image: otel/opentelemetry-collector:0.155.0
    command:
      - "--config=/etc/otelcol/config.yaml"
    volumes:
      - ./configs/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    profiles:
      - dev

  media-mcp:
    build:
      context: .
      dockerfile: crates/media-mcp/Dockerfile
    depends_on:
      artifact-service:
        condition: service_started
    command:
      - "--port"
      - "8787"
      - "--public-base-url"
      - "${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}"
      - "--static-dir"
      - "/app/assets"
      - "--allow-loopback-hosts"
      - "--allowed-host"
      - "media-mcp:8787"
      - "--state-db"
      - "/var/lib/veoveo/media/state.duckdb"
      - "--artifact-service-url"
      - "http://artifact-service:8790"
      - "--task-metadata-retention-days"
      - "30"
      - "--artifact-metadata-retention-days"
      - "30"
      - "--artifact-bytes-retention-days"
      - "30"
      - "--usage-analytics-retention-days"
      - "365"
    environment:
      MEDIA_PROVIDER_API_KEY: "${MEDIA_PROVIDER_API_KEY:?set MEDIA_PROVIDER_API_KEY}"
      MEDIA_PROVIDER_WEBHOOK_SECRET: "${MEDIA_PROVIDER_WEBHOOK_SECRET:-}"
      VEOVEO_INTERNAL_TOKEN_SECRET: "${VEOVEO_INTERNAL_TOKEN_SECRET:?set VEOVEO_INTERNAL_TOKEN_SECRET}"
      OTEL_SERVICE_NAME: veoveo-media-mcp
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      RUST_LOG: "info,veoveo_media_mcp=debug"
    volumes:
      - ./assets:/app/assets:ro
      - media_state:/var/lib/veoveo/media
    ports:
      - "127.0.0.1:8787:8787"
    profiles:
      - dev

  timeseries-mcp:
    build:
      context: .
      dockerfile: crates/timeseries-mcp/Dockerfile
    depends_on:
      artifact-service:
        condition: service_started
    command:
      - "--port"
      - "8789"
      - "--public-base-url"
      - "${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}"
      - "--allow-loopback-hosts"
      - "--allowed-host"
      - "timeseries-mcp:8789"
      - "--state-db"
      - "/var/lib/veoveo/timeseries/state.duckdb"
      - "--artifact-service-url"
      - "http://artifact-service:8790"
    environment:
      VEOVEO_INTERNAL_TOKEN_SECRET: "${VEOVEO_INTERNAL_TOKEN_SECRET:?set VEOVEO_INTERNAL_TOKEN_SECRET}"
      OTEL_SERVICE_NAME: veoveo-timeseries-mcp
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      RUST_LOG: "info,veoveo_timeseries_mcp=debug"
    volumes:
      - timeseries_state:/var/lib/veoveo/timeseries
    ports:
      - "127.0.0.1:8789:8789"
    profiles:
      - dev

  optimization-mcp:
    build:
      context: .
      dockerfile: crates/optimization-mcp/Dockerfile
    depends_on:
      artifact-service:
        condition: service_started
    command:
      - "--port"
      - "8792"
      - "--public-base-url"
      - "${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}"
      - "--allow-loopback-hosts"
      - "--allowed-host"
      - "optimization-mcp:8792"
      - "--state-db"
      - "/var/lib/veoveo/optimization/state.duckdb"
      - "--artifact-service-url"
      - "http://artifact-service:8790"
    environment:
      VEOVEO_INTERNAL_TOKEN_SECRET: "${VEOVEO_INTERNAL_TOKEN_SECRET:?set VEOVEO_INTERNAL_TOKEN_SECRET}"
      OTEL_SERVICE_NAME: veoveo-optimization-mcp
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      RUST_LOG: "info,veoveo_optimization_mcp=debug"
    volumes:
      - optimization_state:/var/lib/veoveo/optimization
    ports:
      - "127.0.0.1:8792:8792"
    profiles:
      - dev

  coordinates-mcp:
    build:
      context: .
      dockerfile: crates/coordinates-mcp/Dockerfile
    depends_on:
      artifact-service:
        condition: service_started
    command:
      - "--port"
      - "8793"
      - "--public-base-url"
      - "${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}"
      - "--allow-loopback-hosts"
      - "--allowed-host"
      - "coordinates-mcp:8793"
      - "--artifact-service-url"
      - "http://artifact-service:8790"
    environment:
      VEOVEO_INTERNAL_TOKEN_SECRET: "${VEOVEO_INTERNAL_TOKEN_SECRET:?set VEOVEO_INTERNAL_TOKEN_SECRET}"
      OTEL_SERVICE_NAME: veoveo-coordinates-mcp
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      RUST_LOG: "info,veoveo_coordinates_mcp=debug"
    ports:
      - "127.0.0.1:8793:8793"
    profiles:
      - dev

  duckdb-mcp:
    build:
      context: .
      dockerfile: crates/duckdb-mcp/Dockerfile
    depends_on:
      artifact-service:
        condition: service_started
    command:
      - "--port"
      - "8791"
      - "--public-base-url"
      - "${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}"
      - "--allow-loopback-hosts"
      - "--allowed-host"
      - "duckdb-mcp:8791"
      - "--state-db"
      - "/var/lib/veoveo/duckdb/state.duckdb"
      - "--database-dir"
      - "/var/lib/veoveo/duckdb/databases"
      - "--exchange-dir"
      - "/var/lib/veoveo/duckdb/exchange"
      - "--spill-dir"
      - "/var/lib/veoveo/duckdb/spill"
      - "--artifact-service-url"
      - "http://artifact-service:8790"
    environment:
      VEOVEO_INTERNAL_TOKEN_SECRET: "${VEOVEO_INTERNAL_TOKEN_SECRET:?set VEOVEO_INTERNAL_TOKEN_SECRET}"
      OTEL_SERVICE_NAME: veoveo-duckdb-mcp
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      RUST_LOG: "info,veoveo_duckdb_mcp=debug"
    # Defense in depth around arbitrary SQL: the engine sandbox is primary, the
    # container is the backstop. Only the state volume is writable.
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: 2g
    tmpfs:
      - /tmp
    volumes:
      - duckdb_state:/var/lib/veoveo/duckdb
    ports:
      - "127.0.0.1:8791:8791"
    profiles:
      - dev

  chart-mcp:
    build:
      context: .
      dockerfile: containers/chart-mcp/Dockerfile
    command:
      - "--transport"
      - "http"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8795"
      - "--path"
      - "/mcp"
      - "--allowed-hosts"
      - "chart-mcp:8795,localhost:8795,127.0.0.1:8795"
      - "--disable-file-reference"
    environment:
      OTEL_SERVICE_NAME: chart-mcp
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:8795:8795"
    profiles:
      - dev

  # The AI Pilot: a long-lived agent on the kernel, opt-in via the `agents`
  # profile (it spends real LLM tokens). Connects to the gateway internally
  # as the pilot-agent service principal; its manifest and migrations mount
  # read-only from configs/agents/pilot, and PILOT_GATEWAY_URL points the
  # manifest at the in-network gateway.
  pilot-agent:
    build:
      context: .
      dockerfile: crates/agent-kernel/Dockerfile
    depends_on:
      mcp-gateway:
        condition: service_started
    command:
      - "run"
      - "--manifest"
      - "/etc/veoveo/pilot/manifest.json"
      - "--data-dir"
      - "/var/lib/veoveo/pilot"
      - "--operator-port"
      - "8794"
      - "--viewer-tee"
      - "rerun+http://rerun-bridge:9876/proxy"
    environment:
      PILOT_GATEWAY_URL: "http://mcp-gateway:8788"
      CLOUDFLARE_ACCOUNT_ID: "${CLOUDFLARE_ACCOUNT_ID:-}"
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN:-}"
      PILOT_AGENT_PRIVATE_KEY_DER_B64: "${PILOT_AGENT_PRIVATE_KEY_DER_B64:-}"
      AGENT_OPERATOR_TOKEN: "${AGENT_OPERATOR_TOKEN:-}"
      OTEL_SERVICE_NAME: veoveo-pilot-agent
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      RUST_LOG: "info,veoveo_agent_kernel=debug"
    volumes:
      - ./configs/agents/pilot:/etc/veoveo/pilot:ro
      - pilot_data:/var/lib/veoveo/pilot
    ports:
      - "127.0.0.1:8794:8794"
    profiles:
      - agents

  rerun-bridge:
    build:
      context: .
      dockerfile: crates/mcp-stdio-bridge/Dockerfile
    command:
      - "--listen"
      - "0.0.0.0:8790"
      - "--allowed-host"
      - "rerun-bridge:8790,localhost:8790,127.0.0.1:8790"
      - "--"
      - "rerun"
      - "viewer-mcp"
    environment:
      RUST_LOG: "info"
    ports:
      # Host SDKs log recordings into the containerized headless viewer.
      - "127.0.0.1:9876:9876"
    profiles:
      - dev

  artifact-plane-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: veoveo_artifact
      POSTGRES_USER: veoveo_artifact
      POSTGRES_PASSWORD: veoveo_artifact
    volumes:
      - artifact_plane_control:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veoveo_artifact -d veoveo_artifact"]
      interval: 2s
      timeout: 5s
      retries: 30
    profiles:
      - dev

  # The shared artifact plane: single byte-level PEP over an encrypted,
  # tenant-scoped store and a Postgres grant ledger. Domain servers call it
  # with the gateway-signed identity they already hold.
  artifact-service:
    build:
      context: .
      dockerfile: crates/artifact-service/Dockerfile
    depends_on:
      rustfs-init:
        condition: service_completed_successfully
      artifact-plane-db:
        condition: service_healthy
    environment:
      ARTIFACT_SERVICE_BIND: "0.0.0.0:8790"
      DATABASE_URL: "postgresql://veoveo_artifact:veoveo_artifact@artifact-plane-db:5432/veoveo_artifact"
      INTERNAL_TOKEN_SECRET: "${VEOVEO_INTERNAL_TOKEN_SECRET:?set VEOVEO_INTERNAL_TOKEN_SECRET}"
      ARTIFACT_MASTER_KEY: "${VEOVEO_ARTIFACT_MASTER_KEY:?set VEOVEO_ARTIFACT_MASTER_KEY (64 hex chars)}"
      ARTIFACT_ALLOWED_AUDIENCES: "media,timeseries,optimization,duckdb,coordinates"
      ARTIFACT_STORE: "s3"
      ARTIFACT_S3_ENDPOINT: "http://rustfs:9000"
      ARTIFACT_S3_BUCKET: "artifact-plane"
      ARTIFACT_S3_REGION: "us-east-1"
      ARTIFACT_S3_ACCESS_KEY_ID: rustfsadmin
      ARTIFACT_S3_SECRET_ACCESS_KEY: rustfsadmin
      ARTIFACT_S3_ALLOW_HTTP: "true"
      OTEL_SERVICE_NAME: veoveo-artifact-service
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      RUST_LOG: "info,veoveo_artifact_service=debug"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: 1g
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:8790:8790"
    profiles:
      - dev

  gateway-control-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: veoveo_gateway
      POSTGRES_USER: veoveo_gateway
      POSTGRES_PASSWORD: veoveo_gateway
    volumes:
      - gateway_control:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veoveo_gateway -d veoveo_gateway"]
      interval: 2s
      timeout: 5s
      retries: 30
    profiles:
      - dev

  mcp-gateway-seed:
    build:
      context: .
      dockerfile: crates/mcp-gateway/Dockerfile
    depends_on:
      gateway-control-db:
        condition: service_healthy
    command:
      - "control-plane-seed"
      - "--control-db-url"
      - "postgresql://veoveo_gateway:veoveo_gateway@gateway-control-db:5432/veoveo_gateway"
      - "--control-plane"
      - "/etc/veoveo/gateway.bioma.json"
      - "--applied-by"
      - "compose#bioma-seed"
    volumes:
      - ./configs/gateway.bioma.json:/etc/veoveo/gateway.bioma.json:ro
    profiles:
      - dev

  mcp-gateway:
    build:
      context: .
      dockerfile: crates/mcp-gateway/Dockerfile
    depends_on:
      media-mcp:
        condition: service_started
      timeseries-mcp:
        condition: service_started
      optimization-mcp:
        condition: service_started
      coordinates-mcp:
        condition: service_started
      duckdb-mcp:
        condition: service_started
      chart-mcp:
        condition: service_started
      mcp-gateway-seed:
        condition: service_completed_successfully
    command:
      - "serve"
      - "--port"
      - "8788"
      - "--public-base-url"
      - "${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}"
      - "--control-db-url"
      - "postgresql://veoveo_gateway:veoveo_gateway@gateway-control-db:5432/veoveo_gateway"
      - "--state-db"
      - "/var/lib/veoveo/gateway/state.duckdb"
      - "--allow-loopback-hosts"
      - "--audit-event-retention-days"
      - "365"
    volumes:
      - gateway_state:/var/lib/veoveo/gateway
    environment:
      VEOVEO_IDP_OIDC_CLIENT_SECRET: "${VEOVEO_IDP_OIDC_CLIENT_SECRET:?set VEOVEO_IDP_OIDC_CLIENT_SECRET}"
      VEOVEO_INTERNAL_TOKEN_SECRET: "${VEOVEO_INTERNAL_TOKEN_SECRET:?set VEOVEO_INTERNAL_TOKEN_SECRET}"
      VEOVEO_AUTHORIZATION_SERVER_PRIVATE_KEY_DER_B64: "${VEOVEO_AUTHORIZATION_SERVER_PRIVATE_KEY_DER_B64:?set VEOVEO_AUTHORIZATION_SERVER_PRIVATE_KEY_DER_B64}"
      OTEL_SERVICE_NAME: veoveo-mcp-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      RUST_LOG: "info,veoveo_mcp_gateway=debug"
    ports:
      - "127.0.0.1:8788:8788"
    profiles:
      - dev

  edge:
    image: caddy:2.11.2
    depends_on:
      - mcp-gateway
      - media-mcp
      - coordinates-mcp
    volumes:
      - ./configs/Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "127.0.0.1:8780:8080"
    profiles:
      - dev

  # The Recording Hub: durable ingest (spooler) + queryable catalog. Both sit
  # on the internal network only — the OSS gRPC proxy and redap catalog trust
  # every caller, so the loopback publishes are for local debugging, not access.
  hub-spooler:
    build:
      context: .
      dockerfile: crates/recording-hub/Dockerfile
    command:
      - "spooler"
      - "--bind"
      - "0.0.0.0:9876"
      - "--spool-dir"
      - "/var/lib/veoveo/spool"
      - "--route"
      - "agents=veoveo-agent"
      - "--route"
      - "world="
      - "--rerun-bin"
      - "/usr/local/bin/rerun"
      - "--flush-interval-ms"
      - "250"
    environment:
      RUST_LOG: "info,veoveo_recording_hub=debug"
    volumes:
      - hub_spool:/var/lib/veoveo/spool
    ports:
      # Producers (sensors, agent tees) push here; loopback for debugging.
      - "127.0.0.1:9877:9876"
    profiles:
      - hub

  hub-catalog:
    build:
      context: .
      dockerfile: crates/recording-hub/Dockerfile
    depends_on:
      hub-spooler:
        condition: service_started
    command:
      - "rerun"
      - "server"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "51234"
      - "-d"
      - "world=/var/lib/veoveo/spool/world"
      - "-d"
      - "agents=/var/lib/veoveo/spool/agents"
    volumes:
      # Readers mount the spool read-only; only the spooler writes.
      - hub_spool:/var/lib/veoveo/spool:ro
    ports:
      - "127.0.0.1:51234:51234"
    restart: on-failure
    profiles:
      - hub

volumes:
  rustfs_data:
  pilot_data:
  media_state:
  timeseries_state:
  optimization_state:
  duckdb_state:
  gateway_control:
  gateway_state:
  artifact_plane_control:
  hub_spool:
