services:
  rustfs-perms:
    image: alpine:3.20
    user: root
    volumes:
      - rustfs_data:/data
    command: chown -R 10001:10001 /data
    profiles:
      - dev

  rustfs:
    image: rustfs/rustfs:1.0.0-beta.8
    depends_on:
      rustfs-perms:
        condition: service_completed_successfully
    command: ["/data"]
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    profiles:
      - dev

  rustfs-init:
    image: amazon/aws-cli:latest
    depends_on:
      rustfs:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until aws --endpoint-url http://rustfs:9000 s3api head-bucket --bucket media-artifacts 2>/dev/null \
          || aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket media-artifacts; do
          sleep 2
        done
    environment:
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_DEFAULT_REGION: us-east-1
      AWS_PAGER: ""
    profiles:
      - dev

  otel-collector:
    image: otel/opentelemetry-collector:0.155.0
    command:
      - "--config=/etc/otelcol/config.yaml"
    volumes:
      - ./configs/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    profiles:
      - dev

  media-mcp:
    build:
      context: .
      dockerfile: crates/media-mcp/Dockerfile
    depends_on:
      rustfs-init:
        condition: service_completed_successfully
    command:
      - "--port"
      - "8787"
      - "--public-base-url"
      - "${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}"
      - "--static-dir"
      - "/app/assets"
      - "--allow-loopback-hosts"
      - "--allowed-host"
      - "media-mcp:8787"
      - "--state-db"
      - "/var/lib/veoveo/media/state.duckdb"
      - "--artifact-store"
      - "s3-compatible"
      - "--artifact-endpoint"
      - "http://rustfs:9000"
      - "--artifact-allow-http"
      - "--artifact-bucket"
      - "media-artifacts"
      - "--artifact-region"
      - "us-east-1"
      - "--task-metadata-retention-days"
      - "30"
      - "--artifact-metadata-retention-days"
      - "30"
      - "--artifact-bytes-retention-days"
      - "30"
      - "--usage-analytics-retention-days"
      - "365"
    environment:
      MEDIA_PROVIDER_API_KEY: "${MEDIA_PROVIDER_API_KEY:?set MEDIA_PROVIDER_API_KEY}"
      MEDIA_PROVIDER_WEBHOOK_SECRET: "${MEDIA_PROVIDER_WEBHOOK_SECRET:-}"
      VEOVEO_INTERNAL_TOKEN_SECRET: "${VEOVEO_INTERNAL_TOKEN_SECRET:?set VEOVEO_INTERNAL_TOKEN_SECRET}"
      OTEL_SERVICE_NAME: veoveo-media-mcp
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      RUST_LOG: "info,veoveo_media_mcp=debug"
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./assets:/app/assets:ro
      - media_state:/var/lib/veoveo/media
    ports:
      - "127.0.0.1:8787:8787"
    profiles:
      - dev

  rerun-bridge:
    build:
      context: .
      dockerfile: crates/mcp-stdio-bridge/Dockerfile
    command:
      - "--listen"
      - "0.0.0.0:8790"
      - "--allowed-host"
      - "rerun-bridge:8790,localhost:8790,127.0.0.1:8790"
      - "--"
      - "rerun"
      - "viewer-mcp"
    environment:
      RUST_LOG: "info"
    ports:
      # Host SDKs log recordings into the containerized headless viewer.
      - "127.0.0.1:9876:9876"
    profiles:
      - dev

  gateway-control-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: veoveo_gateway
      POSTGRES_USER: veoveo_gateway
      POSTGRES_PASSWORD: veoveo_gateway
    volumes:
      - gateway_control:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veoveo_gateway -d veoveo_gateway"]
      interval: 2s
      timeout: 5s
      retries: 30
    profiles:
      - dev

  mcp-gateway-seed:
    build:
      context: .
      dockerfile: crates/mcp-gateway/Dockerfile
    depends_on:
      gateway-control-db:
        condition: service_healthy
    command:
      - "control-plane-seed"
      - "--control-db-url"
      - "postgresql://veoveo_gateway:veoveo_gateway@gateway-control-db:5432/veoveo_gateway"
      - "--control-plane"
      - "/etc/veoveo/gateway.bioma.json"
      - "--applied-by"
      - "compose#bioma-seed"
    volumes:
      - ./configs/gateway.bioma.json:/etc/veoveo/gateway.bioma.json:ro
    profiles:
      - dev

  mcp-gateway:
    build:
      context: .
      dockerfile: crates/mcp-gateway/Dockerfile
    depends_on:
      media-mcp:
        condition: service_started
      mcp-gateway-seed:
        condition: service_completed_successfully
    command:
      - "serve"
      - "--port"
      - "8788"
      - "--public-base-url"
      - "${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}"
      - "--control-db-url"
      - "postgresql://veoveo_gateway:veoveo_gateway@gateway-control-db:5432/veoveo_gateway"
      - "--state-db"
      - "/var/lib/veoveo/gateway/state.duckdb"
      - "--allow-loopback-hosts"
      - "--audit-event-retention-days"
      - "365"
    volumes:
      - gateway_state:/var/lib/veoveo/gateway
    environment:
      VEOVEO_IDP_OIDC_CLIENT_SECRET: "${VEOVEO_IDP_OIDC_CLIENT_SECRET:?set VEOVEO_IDP_OIDC_CLIENT_SECRET}"
      VEOVEO_INTERNAL_TOKEN_SECRET: "${VEOVEO_INTERNAL_TOKEN_SECRET:?set VEOVEO_INTERNAL_TOKEN_SECRET}"
      VEOVEO_AUTHORIZATION_SERVER_PRIVATE_KEY_DER_B64: "${VEOVEO_AUTHORIZATION_SERVER_PRIVATE_KEY_DER_B64:?set VEOVEO_AUTHORIZATION_SERVER_PRIVATE_KEY_DER_B64}"
      OTEL_SERVICE_NAME: veoveo-mcp-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      RUST_LOG: "info,veoveo_mcp_gateway=debug"
    ports:
      - "127.0.0.1:8788:8788"
    profiles:
      - dev

  edge:
    image: caddy:2.11.2
    depends_on:
      - mcp-gateway
      - media-mcp
    volumes:
      - ./configs/Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "127.0.0.1:8780:8080"
    profiles:
      - dev

volumes:
  rustfs_data:
  media_state:
  gateway_control:
  gateway_state:
