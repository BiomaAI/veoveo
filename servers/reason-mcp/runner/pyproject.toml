[project]
name = "reason-runner"
version = "0.1.0"
description = "Veoveo reason world-model runner: the typed per-task boundary over the image's vLLM runtime"
requires-python = ">=3.12"
# vllm is supplied by the deployable image and is deliberately not declared;
# installing it from PyPI here would shadow the image's CUDA-matched build.
dependencies = [
    "av>=15",
    "num2words>=0.5.14",
    "numpy>=2",
    "pillow>=11",
    "pydantic>=2.8",
]

[project.optional-dependencies]
dev = ["pytest>=8"]

[project.scripts]
reason-runner = "reason_runner.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/reason_runner"]
