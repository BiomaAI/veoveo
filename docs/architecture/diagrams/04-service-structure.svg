<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1200" width="1800" height="1200" role="img" aria-labelledby="title desc">
<title id="title">Service structure</title>
<desc id="desc">Implementation-independent UAF services and their realization by Veoveo software resources.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#21465b"/></marker>
<marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#687983"/></marker>
<filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0b2534" flood-opacity="0.12"/></filter>
</defs>
<style>
.title{font:700 30px Arial,Helvetica,sans-serif;fill:#102f40}.subtitle{font:400 15px Arial,Helvetica,sans-serif;fill:#4d626d}.label{font:700 14px Arial,Helvetica,sans-serif;fill:#102f40;letter-spacing:.04em}.node-title{font:700 17px Arial,Helvetica,sans-serif;fill:#102f40}.node-id{font:700 12px Arial,Helvetica,sans-serif;fill:#176b68;letter-spacing:.04em}.body{font:400 14px Arial,Helvetica,sans-serif;fill:#2d4653}.small{font:400 12px Arial,Helvetica,sans-serif;fill:#526a76}.tiny{font:400 10px Arial,Helvetica,sans-serif;fill:#526a76}.inverse{fill:#ffffff}.edge{stroke:#21465b;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.edge-muted{stroke:#687983;stroke-width:1.6;fill:none;marker-end:url(#arrow-muted)}.edge-dash{stroke:#687983;stroke-width:1.5;stroke-dasharray:7 6;fill:none;marker-end:url(#arrow-muted)}
</style>
<rect x="0" y="0" width="1800" height="1200" rx="0" fill="#f5f2eb" stroke="none" stroke-width="1" opacity="1"/>
<rect x="0" y="0" width="1800" height="82" rx="0" fill="#102f40" stroke="none" stroke-width="1" opacity="1"/>
<text x="36" y="43" class="title inverse" text-anchor="start">Service structure</text>
<text x="1764" y="32" class="label inverse" text-anchor="end">VV-VIEW-04</text>
<text x="1764" y="57" class="small inverse" text-anchor="end">UAF 1.3 / SysML 1.6 | v0.1.0</text>
<rect x="38" y="120" width="1724" height="225" rx="12" fill="#d9ebe7" stroke="#b9c8ce" stroke-width="1.2" opacity="1"/>
<text x="56" y="146" class="label" text-anchor="start">Access and oversight</text>
<text x="1744" y="146" class="small" text-anchor="end">UAF Services</text>
<rect x="272.5" y="167" width="405" height="158" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="272.5" y="167" width="7" height="158" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="290.5" y="190" class="node-id" text-anchor="start">VV-SVC-001</text>
<text x="290.5" y="214" class="node-title" text-anchor="start">
<tspan x="290.5" dy="0">MCP aggregation service</tspan>
</text>
<text x="290.5" y="237" class="small" text-anchor="start">
<tspan x="290.5" dy="0">Discovers hosted surfaces and projects</tspan>
<tspan x="290.5" dy="16">policy-scoped profiles.</tspan>
</text>
<rect x="697.5" y="167" width="405" height="158" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="697.5" y="167" width="7" height="158" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="715.5" y="190" class="node-id" text-anchor="start">VV-SVC-002</text>
<text x="715.5" y="214" class="node-title" text-anchor="start">
<tspan x="715.5" dy="0">Identity and authorization service</tspan>
</text>
<text x="715.5" y="237" class="small" text-anchor="start">
<tspan x="715.5" dy="0">Federates OIDC and issues resource-bound</tspan>
<tspan x="715.5" dy="16">external and internal tokens.</tspan>
</text>
<rect x="1122.5" y="167" width="405" height="158" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="1122.5" y="167" width="7" height="158" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="1140.5" y="190" class="node-id" text-anchor="start">VV-SVC-008</text>
<text x="1140.5" y="214" class="node-title" text-anchor="start">
<tspan x="1140.5" dy="0">Operations console service</tspan>
</text>
<text x="1140.5" y="237" class="small" text-anchor="start">
<tspan x="1140.5" dy="0">Projects safe operational state and explicit</tspan>
<tspan x="1140.5" dy="16">administrative actions.</tspan>
</text>
<rect x="38" y="367" width="1724" height="225" rx="12" fill="#deebf2" stroke="#b9c8ce" stroke-width="1.2" opacity="1"/>
<text x="56" y="393" class="label" text-anchor="start">Coordination and governance</text>
<text x="1744" y="393" class="small" text-anchor="end">UAF Services</text>
<rect x="60.0" y="414" width="405" height="158" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="60.0" y="414" width="7" height="158" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="78.0" y="437" class="node-id" text-anchor="start">VV-SVC-003</text>
<text x="78.0" y="461" class="node-title" text-anchor="start">
<tspan x="78.0" dy="0">Durable work coordination service</tspan>
</text>
<text x="78.0" y="484" class="small" text-anchor="start">
<tspan x="78.0" dy="0">Coordinates task state, recovery, input,</tspan>
<tspan x="78.0" dy="16">cancellation, result, and notifications.</tspan>
</text>
<rect x="485.0" y="414" width="405" height="158" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="485.0" y="414" width="7" height="158" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="503.0" y="437" class="node-id" text-anchor="start">VV-SVC-004</text>
<text x="503.0" y="461" class="node-title" text-anchor="start">
<tspan x="503.0" dy="0">Artifact governance service</tspan>
</text>
<text x="503.0" y="484" class="small" text-anchor="start">
<tspan x="503.0" dy="0">Controls artifact identity, bytes, grants,</tspan>
<tspan x="503.0" dy="16">release, capabilities, and sharing.</tspan>
</text>
<rect x="910.0" y="414" width="405" height="158" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="910.0" y="414" width="7" height="158" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="928.0" y="437" class="node-id" text-anchor="start">VV-SVC-005</text>
<text x="928.0" y="461" class="node-title" text-anchor="start">
<tspan x="928.0" dy="0">Recording durability service</tspan>
</text>
<text x="928.0" y="484" class="small" text-anchor="start">
<tspan x="928.0" dy="0">Accepts world streams and maintains</tspan>
<tspan x="928.0" dy="16">crash-decodable governed recordings.</tspan>
</text>
<rect x="1335.0" y="414" width="405" height="158" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="1335.0" y="414" width="7" height="158" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="1353.0" y="437" class="node-id" text-anchor="start">VV-SVC-010</text>
<text x="1353.0" y="461" class="node-title" text-anchor="start">
<tspan x="1353.0" dy="0">Telemetry and audit service</tspan>
</text>
<text x="1353.0" y="484" class="small" text-anchor="start">
<tspan x="1353.0" dy="0">Captures decision evidence and approved</tspan>
<tspan x="1353.0" dy="16">operational signals.</tspan>
</text>
<rect x="38" y="614" width="1724" height="225" rx="12" fill="#eee5d8" stroke="#b9c8ce" stroke-width="1.2" opacity="1"/>
<text x="56" y="640" class="label" text-anchor="start">Domain execution</text>
<text x="1744" y="640" class="small" text-anchor="end">UAF Services</text>
<rect x="60.0" y="661" width="405" height="158" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="60.0" y="661" width="7" height="158" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="78.0" y="684" class="node-id" text-anchor="start">VV-SVC-006</text>
<text x="78.0" y="708" class="node-title" text-anchor="start">
<tspan x="78.0" dy="0">Domain compute service</tspan>
</text>
<text x="78.0" y="731" class="small" text-anchor="start">
<tspan x="78.0" dy="0">Runs analytical, forecasting, optimization,</tspan>
<tspan x="78.0" dy="16">frame, and chart workloads.</tspan>
</text>
<rect x="485.0" y="661" width="405" height="158" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="485.0" y="661" width="7" height="158" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="503.0" y="684" class="node-id" text-anchor="start">VV-SVC-007</text>
<text x="503.0" y="708" class="node-title" text-anchor="start">
<tspan x="503.0" dy="0">Agent execution service</tspan>
</text>
<text x="503.0" y="731" class="small" text-anchor="start">
<tspan x="503.0" dy="0">Runs restart-safe bounded episodes over</tspan>
<tspan x="503.0" dy="16">governed context and tools.</tspan>
</text>
<rect x="910.0" y="661" width="405" height="158" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="910.0" y="661" width="7" height="158" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="928.0" y="684" class="node-id" text-anchor="start">VV-SVC-011</text>
<text x="928.0" y="708" class="node-title" text-anchor="start">
<tspan x="928.0" dy="0">Geospatial logistics service</tspan>
</text>
<text x="928.0" y="731" class="small" text-anchor="start">
<tspan x="928.0" dy="0">Governs map releases and serves routing and</tspan>
<tspan x="928.0" dy="16">spatial operations.</tspan>
</text>
<rect x="1335.0" y="661" width="405" height="158" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="1335.0" y="661" width="7" height="158" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="1353.0" y="684" class="node-id" text-anchor="start">VV-SVC-012</text>
<text x="1353.0" y="708" class="node-title" text-anchor="start">
<tspan x="1353.0" dy="0">Recorded perception service</tspan>
</text>
<text x="1353.0" y="731" class="small" text-anchor="start">
<tspan x="1353.0" dy="0">Runs local bounded detection and tracking</tspan>
<tspan x="1353.0" dy="16">over governed recordings.</tspan>
</text>
<rect x="38" y="861" width="1724" height="185" rx="12" fill="#e7e1ef" stroke="#b9c8ce" stroke-width="1.2" opacity="1"/>
<text x="56" y="887" class="label" text-anchor="start">Deployment and assurance</text>
<text x="1744" y="887" class="small" text-anchor="end">UAF Services</text>
<rect x="697.5" y="908" width="405" height="118" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="697.5" y="908" width="7" height="118" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="715.5" y="931" class="node-id" text-anchor="start">VV-SVC-009</text>
<text x="715.5" y="955" class="node-title" text-anchor="start">
<tspan x="715.5" dy="0">Deployment and assurance service</tspan>
</text>
<text x="715.5" y="978" class="small" text-anchor="start">
<tspan x="715.5" dy="0">Builds, deploys, transfers, validates, and</tspan>
<tspan x="715.5" dy="16">verifies installation forms.</tspan>
</text>
<text x="42" y="1080" class="label" text-anchor="start">Principal realization allocations</text>
<text x="42" y="1110" class="node-id" text-anchor="start">VV-SVC-001/002</text>
<text x="42" y="1133" class="small" text-anchor="start">
<tspan x="42" dy="0">VV-CMP-001, 011, 041</tspan>
</text>
<text x="387" y="1110" class="node-id" text-anchor="start">VV-SVC-003</text>
<text x="387" y="1133" class="small" text-anchor="start">
<tspan x="387" dy="0">VV-CMP-008, 009, 012, 038</tspan>
</text>
<text x="732" y="1110" class="node-id" text-anchor="start">VV-SVC-004/005</text>
<text x="732" y="1133" class="small" text-anchor="start">
<tspan x="732" dy="0">VV-CMP-004, 005, 014-016, 023, 039,</tspan>
<tspan x="732" dy="15">047</tspan>
</text>
<text x="1077" y="1110" class="node-id" text-anchor="start">VV-SVC-006/011/012</text>
<text x="1077" y="1133" class="small" text-anchor="start">
<tspan x="1077" dy="0">VV-CMP-017-022, 024-026, 031, 032,</tspan>
<tspan x="1077" dy="15">044-046</tspan>
</text>
<text x="1422" y="1110" class="node-id" text-anchor="start">VV-SVC-007/008/009/010</text>
<text x="1422" y="1133" class="small" text-anchor="start">
<tspan x="1422" dy="0">VV-CMP-002, 003, 006, 007, 033-037,</tspan>
<tspan x="1422" dy="15">040, 042, 048</tspan>
</text>
<rect x="28" y="1165" width="1744" height="1.2" rx="0" fill="#687983" stroke="none" stroke-width="1" opacity="1"/>
<text x="30" y="1186" class="tiny" text-anchor="start">Veoveo reference baseline - no client-specific data</text>
<text x="1770" y="1186" class="tiny" text-anchor="end">Revision 2026-07-14 | VV-VIEW-04</text>
</svg>
