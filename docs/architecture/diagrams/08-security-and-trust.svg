<text x="58" y="156" class="label" text-anchor="start">External trust</text>
<text x="352" y="156" class="small" text-anchor="end">Trust zone</text>
<text x="58" y="182" class="small" text-anchor="start">
<tspan x="58" dy="0">Enterprise users, clients, IdP,</tspan>
<tspan x="58" dy="16">provider, link holders</tspan>
</text>
<rect x="405" y="130" width="330" height="980" rx="12" fill="#e9e7db" stroke="#b9c8ce" stroke-width="1.2" opacity="1"/>
<text x="423" y="156" class="label" text-anchor="start">Published ingress</text>
<text x="717" y="156" class="small" text-anchor="end">Trust zone</text>
<text x="423" y="182" class="small" text-anchor="start">
<tspan x="423" dy="0">TLS edge, console BFF, gateway,</tspan>
<tspan x="423" dy="16">public redemption</tspan>
</text>
<rect x="770" y="130" width="520" height="980" rx="12" fill="#d9ebe7" stroke="#b9c8ce" stroke-width="1.2" opacity="1"/>
<text x="788" y="156" class="label" text-anchor="start">Authenticated application</text>
<text x="1272" y="156" class="small" text-anchor="end">Trust zone</text>
<text x="788" y="182" class="small" text-anchor="start">
<tspan x="788" dy="0">Gateway-issued internal identity and server-local</tspan>
<tspan x="788" dy="16">authorization</tspan>
</text>
<rect x="1325" y="130" width="535" height="980" rx="12" fill="#e7e1ef" stroke="#b9c8ce" stroke-width="1.2" opacity="1"/>
<text x="1343" y="156" class="label" text-anchor="start">Protected data / execution</text>
<text x="1842" y="156" class="small" text-anchor="end">Trust zone</text>
<text x="1343" y="182" class="small" text-anchor="start">
<tspan x="1343" dy="0">SurrealDB, object bytes, RRD, analytical workspaces,</tspan>
<tspan x="1343" dy="16">GPU</tspan>
</text>
