<text x="88" y="742" class="node-title" text-anchor="start">
<tspan x="88" dy="0">Link bearer</tspan>
</text>
<rect x="70" y="845" width="270" height="100" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="70" y="845" width="7" height="100" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
