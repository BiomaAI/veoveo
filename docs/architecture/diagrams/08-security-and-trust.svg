<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 1240" width="1900" height="1240" role="img" aria-labelledby="title desc">
<title id="title">Security and trust</title>
<desc id="desc">Trust zones, identity transitions, data authorities, and principal security controls.</desc>
