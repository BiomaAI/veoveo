<text x="88" y="892" class="node-title" text-anchor="start">
<tspan x="88" dy="0">World producer</tspan>
</text>
<rect x="435" y="235" width="270" height="150" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="435" y="235" width="7" height="150" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="453" y="258" class="node-id" text-anchor="start">VV-CMP-040</text>
<text x="453" y="282" class="node-title" text-anchor="start">
<tspan x="453" dy="0">Edge controls</tspan>
</text>
<text x="453" y="305" class="small" text-anchor="start">
<tspan x="453" dy="0">TLS, route allowlist, bearer-log</tspan>
<tspan x="453" dy="16">suppression</tspan>
</text>
<rect x="435" y="440" width="270" height="150" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="435" y="440" width="7" height="150" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="453" y="463" class="node-id" text-anchor="start">VV-CMP-002</text>
<text x="453" y="487" class="node-title" text-anchor="start">
<tspan x="453" dy="0">Browser controls</tspan>
</text>
<text x="453" y="510" class="small" text-anchor="start">
<tspan x="453" dy="0">PKCE, encrypted cookie, CSRF,</tspan>
<tspan x="453" dy="16">CSP</tspan>
</text>
<rect x="435" y="645" width="270" height="150" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="435" y="645" width="7" height="150" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="453" y="668" class="node-id" text-anchor="start">VV-CMP-001</text>
<text x="453" y="692" class="node-title" text-anchor="start">
<tspan x="453" dy="0">Gateway controls</tspan>
</text>
<text x="453" y="715" class="small" text-anchor="start">
<tspan x="453" dy="0">issuer/key checks, policy,</tspan>
<tspan x="453" dy="16">audit, replay defense</tspan>
</text>
<rect x="435" y="850" width="270" height="150" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="435" y="850" width="7" height="150" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="453" y="873" class="node-id" text-anchor="start">VV-CMP-004</text>
<text x="453" y="897" class="node-title" text-anchor="start">
<tspan x="453" dy="0">Share controls</tspan>
</text>
<text x="453" y="920" class="small" text-anchor="start">
<tspan x="453" dy="0">hash-only bearer, expiry,</tspan>
<tspan x="453" dy="16">limits, revocation</tspan>
</text>
<rect x="805" y="235" width="450" height="150" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="805" y="235" width="7" height="150" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="823" y="258" class="node-id" text-anchor="start">CTRL-01</text>
<text x="823" y="282" class="node-title" text-anchor="start">
<tspan x="823" dy="0">Short-lived internal assertion</tspan>
</text>
<text x="823" y="305" class="small" text-anchor="start">
<tspan x="823" dy="0">Ed25519, kid, issuer, audience, principal, tenant,</tspan>
<tspan x="823" dy="16">labels, scopes, expiry</tspan>
</text>
<rect x="805" y="440" width="450" height="150" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="805" y="440" width="7" height="150" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="823" y="463" class="node-id" text-anchor="start">CTRL-02</text>
<text x="823" y="487" class="node-title" text-anchor="start">
<tspan x="823" dy="0">Server-local enforcement</tspan>
</text>
<text x="823" y="510" class="small" text-anchor="start">
<tspan x="823" dy="0">Canonical audience, domain scope, stable</tspan>
<tspan x="823" dy="16">identifiers, bounded bodies and outputs</tspan>
</text>
<rect x="805" y="645" width="450" height="150" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="805" y="645" width="7" height="150" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="823" y="668" class="node-id" text-anchor="start">CTRL-03</text>
<text x="823" y="692" class="node-title" text-anchor="start">
<tspan x="823" dy="0">Durable decision evidence</tspan>
</text>
<text x="823" y="715" class="small" text-anchor="start">
<tspan x="823" dy="0">Policy decision, explicit principal attributes, task</tspan>
<tspan x="823" dy="16">owner, audit event, outbox order</tspan>
</text>
<rect x="805" y="850" width="450" height="150" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="805" y="850" width="7" height="150" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="823" y="873" class="node-id" text-anchor="start">CTRL-04</text>
<text x="823" y="897" class="node-title" text-anchor="start">
<tspan x="823" dy="0">Least-authority background work</tspan>
</text>
<text x="823" y="920" class="small" text-anchor="start">
<tspan x="823" dy="0">Task-bound expiring write capability; no minted</tspan>
<tspan x="823" dy="16">background principal</tspan>
</text>
<rect x="1358" y="205" width="470" height="135" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="1358" y="205" width="7" height="135" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="1376" y="228" class="node-id" text-anchor="start">VV-CMP-038</text>
<text x="1376" y="252" class="node-title" text-anchor="start">
<tspan x="1376" dy="0">Coordination authority</tspan>
</text>
<text x="1376" y="275" class="small" text-anchor="start">
<tspan x="1376" dy="0">Separate bootstrap/runtime credentials; transactions;</tspan>
<tspan x="1376" dy="16">tenant identifiers; outbox</tspan>
</text>
<rect x="1358" y="380" width="470" height="135" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="1358" y="380" width="7" height="135" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="1376" y="403" class="node-id" text-anchor="start">VV-CMP-039</text>
<text x="1376" y="427" class="node-title" text-anchor="start">
<tspan x="1376" dy="0">Artifact bytes</tspan>
</text>
<text x="1376" y="450" class="small" text-anchor="start">
<tspan x="1376" dy="0">Service-only credentials; tenant storage keys;</tspan>
<tspan x="1376" dy="16">integrity hash; signed redirect</tspan>
</text>
<rect x="1358" y="555" width="470" height="135" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="1358" y="555" width="7" height="135" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="1376" y="578" class="node-id" text-anchor="start">VV-CMP-047</text>
<text x="1376" y="602" class="node-title" text-anchor="start">
<tspan x="1376" dy="0">Recording evidence</tspan>
</text>
<text x="1376" y="625" class="small" text-anchor="start">
<tspan x="1376" dy="0">Private ingest; governed catalog; read authorization;</tspan>
<tspan x="1376" dy="16">crash-decodable files</tspan>
</text>
<rect x="1358" y="730" width="470" height="135" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="1358" y="730" width="7" height="135" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="1376" y="753" class="node-id" text-anchor="start">VV-CMP-045/046</text>
<text x="1376" y="777" class="node-title" text-anchor="start">
<tspan x="1376" dy="0">Domain workspaces</tspan>
</text>
<text x="1376" y="800" class="small" text-anchor="start">
<tspan x="1376" dy="0">Owner paths, locked settings, bounded processes,</tspan>
<tspan x="1376" dy="16">governed input and output</tspan>
</text>
<rect x="1358" y="905" width="470" height="135" rx="9" fill="#ffffff" stroke="#b8c7cd" stroke-width="1" opacity="1" filter="url(#shadow)"/>
<rect x="1358" y="905" width="7" height="135" rx="7" fill="#2c8580" stroke="none" stroke-width="1" opacity="1"/>
<text x="1376" y="928" class="node-id" text-anchor="start">VV-CMP-044</text>
<text x="1376" y="952" class="node-title" text-anchor="start">
<tspan x="1376" dy="0">GPU execution</tspan>
</text>
<text x="1376" y="975" class="small" text-anchor="start">
<tspan x="1376" dy="0">Mounted approved engine, task process boundary, no</tspan>
<tspan x="1376" dy="16">remote inference dependency</tspan>
</text>
