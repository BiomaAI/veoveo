[package]
name = "veoveo-smoke"
version.workspace = true
edition.workspace = true
build = "build.rs"

[[bin]]
name = "smoke"
path = "src/bin/smoke.rs"

[dependencies]
bytes.workspace = true
futures.workspace = true
anyhow.workspace = true
base64.workspace = true
chrono.workspace = true
clap.workspace = true
dotenvy.workspace = true
duckdb.workspace = true
glam.workspace = true
hex.workspace = true
image.workspace = true
jsonwebtoken.workspace = true
rcgen.workspace = true
reqwest = { workspace = true, features = ["cookies", "json", "rustls-no-provider", "stream"] }
re_grpc_server.workspace = true
re_sdk.workspace = true
re_sdk_types.workspace = true
rmcp = { workspace = true, features = ["client", "transport-streamable-http-client-reqwest", "reqwest-tls-no-provider"] }
rustls.workspace = true
scraper.workspace = true
secrecy.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
tokio = { workspace = true, features = ["full"] }
tempfile = "3"
url.workspace = true
uuid.workspace = true
veoveo-mcp-contract = { path = "../../mcp/contract" }
veoveo-mcp-task-extension = { path = "../../mcp/task-extension" }
veoveo-platform-store = { path = "../../platform/store" }
veoveo-recording-forwarder = { path = "../../platform/recordings/forwarder" }
veoveo-recording-hub = { path = "../../platform/recordings/hub" }
veoveo-recording-protocol = { path = "../../platform/recordings/protocol" }
veoveo-sumo-mcp = { path = "../../showcase/sumo/sumo-mcp" }

[build-dependencies]
duckdb.workspace = true
