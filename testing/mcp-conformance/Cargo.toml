[package]
name = "veoveo-mcp-conformance"
version.workspace = true
edition.workspace = true

[[bin]]
name = "conformance"
path = "src/bin/conformance.rs"

[dependencies]
anyhow.workspace = true
axum.workspace = true
axum-server.workspace = true
base64.workspace = true
chrono.workspace = true
clap.workspace = true
jsonwebtoken.workspace = true
jsonschema.workspace = true
rcgen.workspace = true
reqwest = { workspace = true, features = ["rustls-no-provider"] }
rmcp = { workspace = true, features = ["server", "client", "transport-streamable-http-client-reqwest", "transport-streamable-http-server", "reqwest-tls-no-provider"] }
rustls.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["full"] }
tracing-subscriber.workspace = true
url.workspace = true
uuid.workspace = true
veoveo-frames-mcp = { path = "../../servers/frames-mcp" }
veoveo-mcp-apps-extension = { path = "../../mcp/apps-extension" }
veoveo-mcp-contract = { workspace = true, features = ["analytics"] }
veoveo-map-mcp = { path = "../../servers/map-mcp" }
veoveo-mcp-task-extension = { path = "../../mcp/task-extension" }
veoveo-media-mcp = { path = "../../servers/media-mcp" }
veoveo-rrd.workspace = true
