[project]
name = "veoveo-sumo-mcp"
version = "0.1.0"
description = "Task-native MCP server for the SUMO traffic simulator, pushing typed Rerun streams into the Recording Hub"
requires-python = ">=3.11"
dependencies = [
    # Pinned to the last line that carries the SEP-1686 task lifecycle our
    # gateway/kernel speak. See tasks_compat.py for the migration seam.
    "mcp==1.28.1",
    "pydantic>=2.7",
]

[project.optional-dependencies]
# The real SUMO client (only needed against a live simulator; tests use the
# fake driver). The rerun SDK is the push path into the hub.
sumo = ["traci>=1.27", "sumolib>=1.27"]
rerun = ["rerun-sdk==0.34.0"]
dev = ["pytest>=8", "pytest-asyncio>=0.24", "ruff", "mypy"]

[project.scripts]
sumo-mcp = "sumo_mcp.server:main"
sumo-sim = "sumo_mcp.push:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sumo_mcp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = [
    # The SEP-1686 task API is intentionally pinned; the deprecation is expected.
    "ignore:The experimental tasks API is deprecated:DeprecationWarning",
]

[tool.ruff]
line-length = 100

[tool.mypy]
strict = true
python_version = "3.11"
