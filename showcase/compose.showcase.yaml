# The SUMO traffic-world showcase, layered on the main compose stack.
#
#   docker compose -f compose.yaml -f showcase/compose.showcase.yaml \
#       --profile hub --profile showcase up
#
# SUMO runs a live traffic world (TraCI, internal-only); sumo-mcp owns the one
# TraCI connection, pushes /world/sumo/** into the hub spooler, and serves the
# governed sumo__* tools. Everything is internal-network only — TraCI and the
# OSS hub proxy have no auth, so nothing is published beyond loopback.
services:
  sumo:
    build:
      # Contexts are resolved from the project root (the first -f compose file).
      context: ./showcase/sumo
      dockerfile: Dockerfile
    # TraCI is single-client and unauthenticated: internal network only.
    expose:
      - "8813"
    profiles:
      - showcase

  sumo-mcp:
    build:
      context: ./showcase/sumo-mcp
      dockerfile: Dockerfile
    depends_on:
      sumo:
        condition: service_started
      hub-spooler:
        condition: service_started
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8795"
      - "--hub-proxy"
      - "rerun+http://hub-spooler:9876/proxy"
      - "--recording"
      - "sumo-live"
    environment:
      # Real driver: connect TraCI to the SUMO container.
      SUMO_HOST: "sumo"
      SUMO_PORT: "8813"
      SUMO_SCENARIO: "grid"
      # Streamable-HTTP MCP endpoint (a gateway upstream would target this).
      RUST_LOG: "info"
    ports:
      # Loopback for local inspection; the gateway would reach it in-network.
      - "127.0.0.1:8795:8795"
    profiles:
      - showcase
