{{- if .Values.batch.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "uav-sim-%s" .Values.batch.sessionId | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "uav-sim.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.batch.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.batch.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: veoveo
        app.kubernetes.io/instance: {{ .Values.platform.instanceLabel }}
        app.kubernetes.io/component: uav-sim-batch
        veoveo.ai/recording-producer: "true"
    spec:
      runtimeClassName: {{ .Values.scheduling.runtimeClassName }}
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        {{- include "uav-sim.podSecurityContext" . | nindent 8 }}
      nodeSelector:
        {{- toYaml .Values.scheduling.nodeSelector | nindent 8 }}
      {{- with .Values.scheduling.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: isaac-sim
          image: {{ include "uav-sim.image" (list . .Values.images.runtime) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          securityContext:
            {{- include "uav-sim.containerSecurityContext" . | nindent 12 }}
          env:
            {{- include "uav-sim.runtimeEnv" (dict "root" . "sessionId" .Values.batch.sessionId) | nindent 12 }}
            - name: UAV_SIM_EXIT_AFTER_SECONDS
              value: {{ .Values.batch.exitAfterSeconds | quote }}
          resources:
            {{- toYaml .Values.resources.runtime | nindent 12 }}
          volumeMounts:
            - name: shared-memory
              mountPath: /dev/shm
            - name: runtime-cache
              mountPath: /var/lib/veoveo/runtime-cache
            - name: runtime-data
              mountPath: /var/lib/veoveo/.local/share
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
        - name: runtime-cache
          {{- if eq .Values.cache.policy "persistent" }}
          persistentVolumeClaim:
            claimName: uav-sim-batch-runtime-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: runtime-data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
{{- end }}
