global:
  production: false
  veoveoRegistry: ""
  veoveoTag: ""
  imageDigests: {}
  imagePullSecrets: []

images:
  pullPolicy: IfNotPresent
  runtime:
    repository: veoveo/uav-sim-runtime
    tag: 6.0.1
    digest: ""
  mcp:
    repository: veoveo/uav-sim-mcp
    tag: 0.1.0
    digest: ""
  forwarder:
    repository: veoveo/recording-forwarder
    tag: 0.1.0
    digest: ""

platform:
  instanceLabel: veoveo
  publicBaseUrl: http://localhost:8780
  installationSecret: veoveo-installation-secrets
  cesiumSecret: veoveo-uav-sim-secrets
  cesiumTokenKey: cesium-ion-access-token
  surrealService: surrealdb
  surrealNamespace: veoveo
  surrealDatabase: platform
  surrealRuntimeSecret: veoveo-surreal-runtime
  recordingTenantKey: enterprise

recordingForwarder:
  gatewayTransportUrl: http://mcp-gateway:8788
  clientId: recording-producer
  keyId: recording-producer-2026
  signingAlgorithm: rs256
  privateKey:
    existingSecret: veoveo-recording-producer
    key: private-key.pem
  maximumQueueBytes: 4294967296
  batchMessageLimit: 4096
  batchFlushMilliseconds: 1000
  grpcMemoryLimitBytes: 268435456
  persistence:
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 2Gi

world:
  source: google_photorealistic_3d_tiles
  cesiumIonAssetId: 2275207

cache:
  policy: persistent
  version: isaac-6.0.1-cesium-0.29.0-v1
  size: 40Gi
  storageClass: ""
  accessMode: ReadWriteOnce

session:
  id: bioma-uav
  frameUri: frames://frame/bioma-uav-origin
  origin:
    latitudeDegrees: 37.7749
    longitudeDegrees: -122.4194
    ellipsoidHeightM: 30.0
  vehicleCount: 1
  physicsHz: 250
  renderingHz: 20
  tileReadyFrames: 30
  privacyConsent: false
  camera:
    width: 640
    height: 480
    fps: 20
    optics:
      focalLengthMm: 8.0
      clippingRangeM:
        near: 0.05
        far: 100000.0
    mount:
      translationM:
        x: 0.60
        "y": 0.0
        z: 0.05
      orientationWxyz:
        w: 0.7071067811865476
        x: 0.0
        "y": 0.0
        z: -0.7071067811865476
  followCamera:
    width: 1280
    height: 720
    fps: 20
    focalLengthMm: 45.0
    eyeOffsetM:
      x: -2.2
      "y": -2.2
      z: 1.2
    targetOffsetM:
      x: 0.0
      "y": 0.0
      z: 0.2
  screenshot:
    enabled: false
    outputPath: /tmp/isaac-uav.png
    minimumRelativeAltitudeM: 250.0
    settleRenderedFrames: 30

liveStream:
  signalingUrl: ws://127.0.0.1:49101/webrtc
  signalingPath: /webrtc
  privateSignalPort: 49100
  proxyPort: 49101
  publicMediaServer: 127.0.0.1
  mediaPort: 47998
  publicIp: 127.0.0.1
  leaseTtlSeconds: 300
  service:
    type: NodePort
    signalNodePort: 30910
    mediaNodePort: 30998
  ingress:
    enabled: false
    className: ""
    host: ""
    path: /webrtc
    tlsSecret: ""
    annotations: {}

interactive:
  enabled: true
  progressDeadlineSeconds: 1800

batch:
  enabled: false
  sessionId: bioma-uav-batch
  exitAfterSeconds: 60
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400

service:
  port: 8802

resources:
  runtime:
    requests:
      cpu: "4"
      memory: 16Gi
      nvidia.com/gpu: 1
    limits:
      cpu: "16"
      memory: 64Gi
      nvidia.com/gpu: 1
  mcp:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi

scheduling:
  runtimeClassName: nvidia
  nodeSelector:
    kubernetes.io/arch: amd64
  tolerations: []
  affinity: {}

networkPolicy:
  enabled: true
  dnsNamespaceSelector:
    kubernetes.io/metadata.name: kube-system
