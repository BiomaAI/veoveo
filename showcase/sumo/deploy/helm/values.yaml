images:
  pullPolicy: IfNotPresent
  sim:
    repository: veoveo/sumo-sim
    tag: 1.27.1
  mcp:
    repository: veoveo/sumo-mcp
    tag: 0.1.0
  forwarder:
    repository: veoveo/recording-forwarder
    tag: 0.1.0

platform:
  publicBaseUrl: http://localhost:8780
  surrealService: surrealdb
  surrealNamespace: veoveo
  surrealDatabase: platform
  surrealRuntimeSecret: veoveo-surreal-runtime
  installationSecret: veoveo-installation-secrets
  artifactServiceUrl: http://artifact-service:8790

recordingForwarder:
  gatewayTransportUrl: http://mcp-gateway:8788
  clientId: sumo-recording-producer
  keyId: test-key
  signingAlgorithm: rs256
  privateKey:
    existingSecret: veoveo-recording-producer
    key: private-key.pem
  maximumQueueBytes: 1073741824
  persistence:
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 1Gi

telemetry:
  enabled: false
  endpoint: http://otel-collector:4318

simulation:
  scenario: luxembourg
  maxVehicles: 800
  connectRetries: 300

service:
  nodePort: 30895

persistence:
  size: 5Gi
  storageClass: ""

resources:
  sim:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 4Gi
  mcp:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 4Gi
