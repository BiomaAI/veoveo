[package]
name = "veoveo-sumo-mcp"
version.workspace = true
edition.workspace = true

[lib]
name = "veoveo_sumo_mcp"
path = "src/lib.rs"

[[bin]]
name = "sumo-mcp"
path = "src/bin/server.rs"

[dependencies]
anyhow.workspace = true
axum.workspace = true
chrono.workspace = true
clap.workspace = true
dotenvy.workspace = true
futures.workspace = true
re_sdk.workspace = true
re_sdk_types.workspace = true
rmcp = { workspace = true, features = ["server", "macros", "transport-streamable-http-server"] }
rustls.workspace = true
schemars.workspace = true
secrecy.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["full"] }
tokio-util.workspace = true
tower-http.workspace = true
traci-rs.workspace = true
tracing.workspace = true
uuid.workspace = true
veoveo-mcp-contract.workspace = true
veoveo-artifact-client = { path = "../../../crates/artifact-client" }
veoveo-mcp-task-extension = { path = "../../../crates/mcp-task-extension" }
veoveo-task-runtime = { path = "../../../crates/task-runtime" }

[dev-dependencies]
tempfile = "3"
tower = { workspace = true, features = ["util"] }
