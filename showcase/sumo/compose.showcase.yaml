# The SUMO traffic-world showcase, layered on the main compose stack.
#
#   docker compose -f compose.yaml -f showcase/sumo/compose.showcase.yaml \
#       --profile showcase up
#
# SUMO runs a live traffic world (TraCI, internal-only); sumo-mcp owns the one
# TraCI connection, pushes /world/sumo/** into the hub spooler, and serves the
# governed sumo__* tools. TraCI remains internal-only. The loopback MCP port
# still requires a gateway-signed internal identity assertion.
services:
  sumo:
    platform: linux/amd64
    build:
      # Contexts are resolved from the project root (the first -f compose file).
      context: ./showcase/sumo/sim
      dockerfile: Dockerfile
    # TraCI is single-client and unauthenticated: internal network only.
    expose:
      - "8813"
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 512
    tmpfs: [/tmp]
    profiles:
      - showcase

  sumo-mcp:
    platform: linux/amd64
    build:
      context: .
      dockerfile: showcase/sumo/sumo-mcp/Dockerfile
    depends_on:
      sumo:
        condition: service_started
      recording-hub:
        condition: service_healthy
      artifact-service:
        condition: service_healthy
    command:
      - "--port"
      - "8795"
      - "--public-base-url"
      - ${PUBLIC_BASE_URL:-https://veoveo.example}
      - "--allow-loopback-hosts"
      - "--allowed-host"
      - "sumo-mcp:8795"
      - "--allowed-host"
      - "127.0.0.1:8895"
      - "--hub-proxy"
      - "rerun+http://recording-hub:9876/proxy"
      - "--recording"
      - "sumo-live"
      - "--artifact-service-url"
      - "http://artifact-service:8790"
    environment:
      # Real driver: connect TraCI to the SUMO container (LuST / Luxembourg).
      SUMO_HOST: "sumo"
      SUMO_PORT: "8813"
      SUMO_SCENARIO: "luxembourg"
      # Bound the per-frame vehicle set on a dense city network.
      SUMO_MAX_VEHICLES: "800"
      # LuST is large; allow generous time for it to load before TraCI opens.
      SUMO_CONNECT_RETRIES: "300"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://veoveo.example}
      VEOVEO_SURREAL_ENDPOINT: ws://surrealdb:8000
      VEOVEO_SURREAL_NAMESPACE: ${VEOVEO_SURREAL_NAMESPACE:-veoveo}
      VEOVEO_SURREAL_DATABASE: ${VEOVEO_SURREAL_DATABASE:-platform}
      VEOVEO_SURREAL_AUTH_LEVEL: database
      VEOVEO_SURREAL_USERNAME: ${VEOVEO_SURREAL_RUNTIME_USERNAME:?set VEOVEO_SURREAL_RUNTIME_USERNAME}
      VEOVEO_SURREAL_PASSWORD: ${VEOVEO_SURREAL_RUNTIME_PASSWORD:?set VEOVEO_SURREAL_RUNTIME_PASSWORD}
      VEOVEO_INTERNAL_TRUST_JWKS: ${VEOVEO_INTERNAL_TRUST_JWKS:?set VEOVEO_INTERNAL_TRUST_JWKS}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      RUST_LOG: "info"
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 512
    tmpfs: [/tmp]
    volumes:
      - sumo_work:/var/lib/veoveo/sumo
    ports:
      # Loopback-only and authenticated; 8795 is the canonical chart MCP port.
      - "127.0.0.1:${SUMO_MCP_HOST_PORT:-8895}:8795"
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8795/sumo/healthz]
      interval: 3s
      timeout: 3s
      retries: 100
      start_period: 30s
    profiles:
      - showcase

volumes:
  sumo_work:
