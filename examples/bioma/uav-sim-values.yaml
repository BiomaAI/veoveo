global:
  production: true

platform:
  instanceLabel: veoveo
  publicBaseUrl: https://veoveo.bioma.ai
  cesiumSecret: veoveo-uav-sim-secrets
  recordingTenantKey: bioma

session:
  camera:
    width: 640
    height: 480
    fps: 20
    optics:
      focalLengthMm: 8.0
      clippingRangeM:
        near: 0.05
        far: 100000.0
    mount:
      translationM:
        x: 0.60
        "y": 0.0
        z: 0.05
      orientationWxyz:
        w: 0.7071067811865476
        x: 0.0
        "y": 0.0
        z: -0.7071067811865476
  followCamera:
    width: 1280
    height: 720
    fps: 20
    focalLengthMm: 32.0
    eyeOffsetM:
      x: -8.0
      "y": -8.0
      z: 4.0
    targetOffsetM:
      x: 0.0
      "y": 0.0
      z: 0.2

liveStream:
  signalingUrl: wss://veoveo.bioma.ai/webrtc
  signalingPath: /webrtc
  privateSignalPort: 49100
  proxyPort: 49101
  publicMediaServer: 127.0.0.1
  mediaPort: 47998
  publicIp: 127.0.0.1
  leaseTtlSeconds: 300
  service:
    type: NodePort
    signalNodePort: 30910
    mediaNodePort: 30998
  ingress:
    enabled: true
    className: traefik
    host: veoveo.bioma.ai
    path: /webrtc
    tlsSecret: ""
    annotations: {}
