apiVersion: v1
kind: Service
metadata:
  name: charts-registry-backend
  namespace: argocd
spec:
  type: ExternalName
  externalName: k3d-veoveo-registry.localhost
  ports:
    - name: registry
      port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: charts-registry
  namespace: argocd
spec:
  type: ExternalName
  externalName: traefik.kube-system.svc.cluster.local
  ports:
    - name: https
      port: 443
      targetPort: 443
