global:
  publicBaseUrl: https://veoveo.bioma.ai

objectStore:
  rustfs:
    publicEndpoint: https://objects-veoveo.bioma.ai

gateway:
  existingControlPlaneConfigMap: bioma-gateway-control-plane
  controlPlaneRevision: 3dd4c6a774d7c0c936b360864490a630aa7f202a6a10a3a0b3919ea75d7fce2d

consoleBff:
  oauthResource: https://veoveo.bioma.ai/mcp/admin

# The UAV acceptance runs Reason over the governed camera recording, so the
# This installation enables the workload. Load the world-model checkpoint into the
# reason-model-cache volume before the acceptance; the pod fails closed
# without it.
reason:
  enabled: true

clusterInspection:
  enabled: true

ingress:
  className: traefik
  host: veoveo.bioma.ai
  objectStoreHost: objects-veoveo.bioma.ai
  tls:
    enabled: false
