{{- if .Values.telemetry.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels:
    {{- include "veoveo.labels" . | nindent 4 }}
    app.kubernetes.io/component: telemetry
spec:
  selector:
    {{- include "veoveo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: telemetry
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  labels:
    {{- include "veoveo.labels" . | nindent 4 }}
    app.kubernetes.io/component: telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "veoveo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: telemetry
  template:
    metadata:
      labels:
        {{- include "veoveo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: telemetry
      annotations:
        {{- include "veoveo.podAnnotations" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "veoveo.serviceAccountName" . }}
      automountServiceAccountToken: false
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      securityContext:
        {{- include "veoveo.podSecurityContext" . | nindent 8 }}
      containers:
        - name: otel-collector
          image: {{ include "veoveo.image" (list . .Values.telemetry.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args: ["--config=/etc/otelcol/config.yaml"]
          {{- with .Values.telemetry.credentialExistingSecret }}
          envFrom:
            - secretRef:
                name: {{ . }}
          {{- end }}
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          readinessProbe:
            tcpSocket:
              port: otlp-http
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: otlp-http
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            {{- include "veoveo.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.telemetry.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ .Values.telemetry.existingConfigMap }}
            items:
              - key: {{ .Values.telemetry.configKey }}
                path: config.yaml
        - name: tmp
          emptyDir: {}
{{- end }}
