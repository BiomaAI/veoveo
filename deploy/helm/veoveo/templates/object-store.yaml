{{- if eq .Values.objectStore.mode "rustfs" }}
apiVersion: v1
kind: Service
metadata:
  name: rustfs
  labels:
    {{- include "veoveo.labels" . | nindent 4 }}
    app.kubernetes.io/component: object-store
spec:
  selector:
    {{- include "veoveo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: object-store
  ports:
    - name: s3
      port: 9000
      targetPort: s3
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rustfs
  labels:
    {{- include "veoveo.labels" . | nindent 4 }}
    app.kubernetes.io/component: object-store
spec:
  serviceName: rustfs
  replicas: 1
  selector:
    matchLabels:
      {{- include "veoveo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: object-store
  template:
    metadata:
      labels:
        {{- include "veoveo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: object-store
      annotations:
        {{- include "veoveo.podAnnotations" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "veoveo.serviceAccountName" . }}
      automountServiceAccountToken: false
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rustfs
          image: {{ include "veoveo.image" (list . .Values.objectStore.rustfs.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args: ["/data"]
          env:
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.existingSecret }}
                  key: object-store-access-key
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.existingSecret }}
                  key: object-store-secret-key
            - name: RUSTFS_CONSOLE_ENABLE
              value: "false"
          ports:
            - name: s3
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /health
              port: s3
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: s3
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
          resources:
            {{- toYaml .Values.objectStore.rustfs.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.objectStore.rustfs.persistence.accessModes | nindent 10 }}
        {{- with .Values.objectStore.rustfs.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.objectStore.rustfs.persistence.size }}
{{- end }}
