{{- range $service := .Values.domainServices }}
{{- if $service.persistence }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $service.name }}-workspace
  labels:
    {{- include "veoveo.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $service.name }}
spec:
  accessModes:
    {{- toYaml $service.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ $service.persistence.size }}
  {{- if $service.persistence.storageClass }}
  storageClassName: {{ $service.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $service.name }}
  labels:
    {{- include "veoveo.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $service.name }}
spec:
  selector:
    {{- include "veoveo.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $service.name }}
  ports:
    - name: http
      port: {{ $service.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $service.name }}
  labels:
    {{- include "veoveo.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $service.name }}
spec:
  replicas: {{ default $.Values.global.defaultReplicas $service.replicas }}
  selector:
    matchLabels:
      {{- include "veoveo.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $service.name }}
  template:
    metadata:
      labels:
        {{- include "veoveo.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $service.name }}
      annotations:
        {{- include "veoveo.podAnnotations" $ | nindent 8 }}
        {{- if and (eq $service.name "map-mcp") $.Values.mapBootstrap.enabled }}
        checksum/map-bootstrap: {{ toJson $.Values.mapBootstrap | sha256sum }}
        {{- end }}
    spec:
      {{- if $service.runtimeClassName }}
      runtimeClassName: {{ $service.runtimeClassName }}
      {{- end }}
      serviceAccountName: {{ include "veoveo.serviceAccountName" $ }}
      automountServiceAccountToken: false
      imagePullSecrets:
        {{- toYaml $.Values.global.imagePullSecrets | nindent 8 }}
      securityContext:
        {{- include "veoveo.podSecurityContext" $ | nindent 8 }}
      containers:
        - name: {{ $service.name }}
          image: {{ include "veoveo.image" (list $ $service.image) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          workingDir: /var/lib/veoveo/runtime
          args:
            {{- toYaml $service.args | nindent 12 }}
            {{- if and (eq $service.name "map-mcp") $.Values.mapBootstrap.enabled }}
            - --bootstrap-catalog
            - /etc/veoveo/map-bootstrap/catalog.json
            {{- end }}
          env:
            {{- if or (not (hasKey $service "platformStore")) $service.platformStore }}
            {{- include "veoveo.commonEnv" $ | nindent 12 }}
            {{- else }}
            {{- if $.Values.telemetry.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            {{- end }}
            {{- end }}
            - name: PUBLIC_BASE_URL
              value: {{ $.Values.global.publicBaseUrl | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ printf "veoveo-%s" $service.name | quote }}
            {{- if eq $service.name "media-mcp" }}
            - name: MEDIA_PROVIDER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.existingSecret }}
                  key: media-provider-api-key
            - name: MEDIA_PROVIDER_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.existingSecret }}
                  key: media-provider-webhook-secret
            {{- end }}
            {{- if eq $service.name "view-mcp" }}
            - name: GOOGLE_MAPS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.existingSecret }}
                  key: google-maps-api-key
                  optional: true
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: graphics,compute,utility
            - name: WGPU_BACKEND
              value: vulkan
            - name: WGPU_POWER_PREF
              value: high
            - name: HOME
              value: /tmp
            - name: XDG_CACHE_HOME
              value: /tmp/wgpu-cache
            {{- end }}
          ports:
            - name: http
              containerPort: {{ $service.port }}
          readinessProbe:
            httpGet:
              path: {{ $service.healthPath }}
              port: http
              httpHeaders:
                - name: Host
                  value: {{ printf "%s:%v" $service.name $service.port | quote }}
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: {{ $service.healthPath }}
              port: http
              httpHeaders:
                - name: Host
                  value: {{ printf "%s:%v" $service.name $service.port | quote }}
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            {{- include "veoveo.containerSecurityContext" $ | nindent 12 }}
          resources:
            {{- toYaml (default $.Values.gateway.resources $service.resources) | nindent 12 }}
          volumeMounts:
            - name: runtime
              mountPath: /var/lib/veoveo/runtime
            - name: tmp
              mountPath: /tmp
            {{- if $service.persistence }}
            - name: workspace
              mountPath: {{ default "/var/lib/veoveo/duckdb" $service.persistenceMountPath }}
            {{- end }}
            {{- if $service.sourceExchangeClaim }}
            - name: source-exchange
              mountPath: /data/map-sources
              readOnly: true
            {{- end }}
            {{- if $service.sourceSecretName }}
            - name: source-secrets
              mountPath: /run/secrets/map
              readOnly: true
            {{- end }}
            {{- if and (eq $service.name "map-mcp") $.Values.mapBootstrap.enabled }}
            - name: map-bootstrap
              mountPath: /etc/veoveo/map-bootstrap
              readOnly: true
            {{- end }}
      volumes:
        - name: runtime
          emptyDir:
            sizeLimit: 1Gi
        - name: tmp
          emptyDir: {}
        {{- if $service.persistence }}
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ $service.name }}-workspace
        {{- end }}
        {{- if $service.sourceExchangeClaim }}
        - name: source-exchange
          persistentVolumeClaim:
            claimName: {{ $service.sourceExchangeClaim }}
        {{- end }}
        {{- if $service.sourceSecretName }}
        - name: source-secrets
          secret:
            secretName: {{ $service.sourceSecretName }}
        {{- end }}
        {{- if and (eq $service.name "map-mcp") $.Values.mapBootstrap.enabled }}
        - name: map-bootstrap
          configMap:
            name: map-bootstrap
        {{- end }}
{{- end }}
