{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "veoveo.fullname" . }}-default-deny
  labels:
    {{- include "veoveo.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "veoveo.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "veoveo.fullname" . }}-dns
  labels:
    {{- include "veoveo.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "veoveo.selectorLabels" . | nindent 6 }}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dnsNamespaceSelector | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "veoveo.fullname" . }}-internal
  labels:
    {{- include "veoveo.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "veoveo.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "veoveo.selectorLabels" . | nindent 14 }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "veoveo.selectorLabels" . | nindent 14 }}
{{- if .Values.networkPolicy.externalEgressCidrs }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "veoveo.fullname" . }}-external-egress
  labels:
    {{- include "veoveo.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "veoveo.selectorLabels" . | nindent 6 }}
  policyTypes: [Egress]
  egress:
    - to:
        {{- range .Values.networkPolicy.externalEgressCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 443
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "veoveo.fullname" . }}-public-ingress
  labels:
    {{- include "veoveo.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: [gateway, console-bff, artifact-service, media-mcp, object-store]
  policyTypes: [Ingress]
  ingress:
    - ports:
        - protocol: TCP
          port: 8788
        - protocol: TCP
          port: 8786
        - protocol: TCP
          port: 8790
        - protocol: TCP
          port: 8787
        - protocol: TCP
          port: 9000
{{- end }}
