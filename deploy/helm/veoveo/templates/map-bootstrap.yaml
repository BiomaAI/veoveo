{{- if .Values.mapBootstrap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: map-bootstrap
  labels:
    {{- include "veoveo.labels" . | nindent 4 }}
    app.kubernetes.io/component: map-mcp
data:
  catalog.json: |
    {{- dict "tenant_key" .Values.mapBootstrap.tenantKey "sources" .Values.mapBootstrap.sources | toJson | nindent 4 }}
{{- end }}
