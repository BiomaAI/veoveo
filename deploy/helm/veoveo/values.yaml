global:
  imageRegistry: ""
  imagePullSecrets: []
  imagePullPolicy: IfNotPresent
  defaultReplicas: 2
  existingSecret: veoveo-installation-secrets
  publicBaseUrl: https://veoveo.enterprise.example
  offline: false
  podAnnotations: {}
  podLabels: {}
  serviceMesh:
    enabled: false
    provider: istio
    podAnnotations: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

surrealdb:
  image:
    repository: surrealdb/surrealdb
    tag: v3.2.1
    digest: ""
  namespace: veoveo
  database: platform
  adminExistingSecret: veoveo-surreal-admin
  runtimeExistingSecret: veoveo-surreal-runtime
  persistence:
    size: 20Gi
    storageClass: ""
    accessModes: [ReadWriteOnce]
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 4Gi

objectStore:
  mode: rustfs
  bucketInitImage:
    repository: amazon/aws-cli
    tag: 2.35.23
    digest: ""
  rustfs:
    image:
      repository: rustfs/rustfs
      tag: 1.0.0-beta.8
      digest: ""
    bucket: artifact-plane
    publicEndpoint: https://objects.enterprise.example
    persistence:
      size: 50Gi
      storageClass: ""
      accessModes: [ReadWriteOnce]
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 2Gi
  externalS3:
    endpoint: ""
    publicEndpoint: ""
    bucket: ""
    region: us-east-1
    allowHttp: false

gateway:
  image:
    repository: veoveo/mcp-gateway
    tag: 0.1.0
    digest: ""
  replicas: 2
  existingControlPlaneConfigMap: veoveo-gateway-control-plane
  controlPlaneKey: gateway.json
  refreshDeliveryWindowSeconds: 5
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

artifactService:
  image:
    repository: veoveo/artifact-service
    tag: 0.1.0
    digest: ""
  replicas: 2
  allowedAudiences: artifact,media,timeseries,optimization,duckdb,frames,map,recording,perception,reason,datasheet
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

recording:
  enabled: true
  tenantKey: enterprise
  workContext: operations
  classification: unclassified
  labels: []
  route: world=
  idleTimeoutSeconds: 15
  segmentMaxBytes: 201326592
  segmentMaxAgeSeconds: 3600
  liveHistorySeconds: 60
  persistence:
    size: 100Gi
    storageClass: ""
    accessModes: [ReadWriteOnce]
  hubImage:
    repository: veoveo/recording-hub
    tag: 0.1.0
    digest: ""
  mcpImage:
    repository: veoveo/recording-mcp
    tag: 0.1.0
    digest: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 4Gi

perception:
  enabled: true
  replicas: 1
  runtimeClassName: nvidia
  image:
    repository: veoveo/perception-mcp
    tag: 0.1.0
    digest: ""
  modelCache:
    size: 5Gi
    storageClass: ""
    accessModes: [ReadWriteOnce]
  builderResources:
    requests:
      cpu: 500m
      memory: 2Gi
      nvidia.com/gpu: "1"
    limits:
      cpu: "4"
      memory: 8Gi
      nvidia.com/gpu: "1"
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
      nvidia.com/gpu: "1"
    limits:
      cpu: "8"
      memory: 16Gi
      nvidia.com/gpu: "1"

reason:
  enabled: false
  replicas: 1
  runtimeClassName: nvidia
  image:
    repository: veoveo/reason-mcp
    tag: 0.1.0
    digest: ""
  modelCache:
    size: 20Gi
    storageClass: ""
    accessModes: [ReadWriteOnce]
  engine:
    gpuMemoryUtilization: 0.7
    maxModelLen: 8192
  resources:
    requests:
      cpu: "1"
      memory: 8Gi
      nvidia.com/gpu: "1"
    limits:
      cpu: "8"
      memory: 24Gi
      nvidia.com/gpu: "1"

# Installation-time server bootstrap documents, keyed by domain-service
# name. Each entry renders a `{name}-bootstrap` ConfigMap mounted at the
# canonical /etc/veoveo/bootstrap/catalog.json and passed to the server via
# --bootstrap-catalog. The payload schema is owned by the server crate;
# validate documents with the server binary's `bootstrap-validate` verb.
# serverBootstrap:
#   map-mcp:
#     server: map
#     tenantKey: installation
#     payload:
#       sources: []
#       mobility_profiles: []
serverBootstrap: {}

consoleBff:
  image:
    repository: veoveo/console-bff
    tag: 0.1.0
    digest: ""
  replicas: 2
  oauthClientId: admin-console
  oauthResource: https://veoveo.enterprise.example/mcp/admin
  oauthScopes:
    - operator:use
    - admin:manage
    - map:admin
    - map:dataset:read
    - time:read
    - view:read
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

clusterInspection:
  enabled: false
  kubernetesApiCidrs: []

domainServices:
  - name: artifact-mcp
    image:
      repository: veoveo/artifact-mcp
      tag: 0.1.0
      digest: ""
    port: 8794
    healthPath: /artifact/healthz
    args:
      - --port
      - "8794"
      - --allowed-host
      - artifact-mcp:8794
      - --artifact-service-url
      - http://artifact-service:8790
  - name: media-mcp
    image:
      repository: veoveo/media-mcp
      tag: 0.1.0
      digest: ""
    port: 8787
    healthPath: /media/healthz
    args:
      - --port
      - "8787"
      - --allowed-host
      - media-mcp:8787
      - --artifact-service-url
      - http://artifact-service:8790
  - name: timeseries-mcp
    image:
      repository: veoveo/timeseries-mcp
      tag: 0.1.0
      digest: ""
    port: 8789
    healthPath: /timeseries/healthz
    args:
      - --port
      - "8789"
      - --allowed-host
      - timeseries-mcp:8789
      - --artifact-service-url
      - http://artifact-service:8790
      - --max-artifact-bytes
      - "536870912"
  - name: optimization-mcp
    image:
      repository: veoveo/optimization-mcp
      tag: 0.1.0
      digest: ""
    port: 8792
    healthPath: /optimization/healthz
    args:
      - --port
      - "8792"
      - --allowed-host
      - optimization-mcp:8792
      - --artifact-service-url
      - http://artifact-service:8790
  - name: frames-mcp
    image:
      repository: veoveo/frames-mcp
      tag: 0.1.0
      digest: ""
    port: 8793
    healthPath: /frames/healthz
    args:
      - serve
      - --port
      - "8793"
      - --allowed-host
      - frames-mcp:8793
      - --artifact-service-url
      - http://artifact-service:8790
      - --max-artifact-bytes
      - "67108864"
  - name: map-mcp
    replicas: 1
    image:
      repository: veoveo/map-mcp
      tag: 0.1.0
      digest: ""
    port: 8799
    healthPath: /map/healthz
    args:
      - serve
      - --port
      - "8799"
      - --allowed-host
      - map-mcp:8799
      - --artifact-service-url
      - http://artifact-service:8790
      - --map-database
      - /var/lib/veoveo/map/catalog.duckdb
      - --duckdb-spill-dir
      - /var/lib/veoveo/map/spill
      - --acquisition-scratch-root
      - /var/lib/veoveo/map/acquisitions
      - --release-root
      - /var/lib/veoveo/map/releases
      - --source-mount-root
      - /data/map-sources
      - --max-artifact-bytes
      - "536870912"
      - --max-routing-expanded-bytes
      - "17179869184"
    persistenceMountPath: /var/lib/veoveo/map
    sourceExchangeClaim: ""
    sourceSecretName: ""
    persistence:
      size: 100Gi
      storageClass: ""
      accessModes: [ReadWriteOnce]
  - name: time-mcp
    replicas: 1
    image:
      repository: veoveo/time-mcp
      tag: 0.1.0
      digest: ""
    port: 8800
    healthPath: /time/healthz
    args:
      - --port
      - "8800"
      - --allowed-host
      - time-mcp:8800
      - --acquisition-scratch-root
      - /var/lib/veoveo/time/acquisitions
      - --release-root
      - /var/lib/veoveo/time/releases
    persistenceMountPath: /var/lib/veoveo/time
    persistence:
      size: 10Gi
      storageClass: ""
      accessModes: [ReadWriteOnce]
  - name: view-mcp
    replicas: 1
    runtimeClassName: nvidia
    image:
      repository: veoveo/view-mcp
      tag: 0.1.0
      digest: ""
    port: 8801
    healthPath: /view/readyz
    args:
      - --port
      - "8801"
      - --allowed-host
      - view-mcp:8801
      - --layer-catalog
      - /etc/veoveo/view/local-layers.json
    resources:
      requests:
        cpu: "1"
        memory: 4Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "8"
        memory: 16Gi
        nvidia.com/gpu: "1"
  - name: datasheet-mcp
    image:
      repository: veoveo/datasheet-mcp
      tag: 0.1.0
      digest: ""
    port: 8798
    healthPath: /datasheet/healthz
    args:
      - --port
      - "8798"
      - --allowed-host
      - datasheet-mcp:8798
      - --artifact-service-url
      - http://artifact-service:8790
  - name: duckdb-mcp
    replicas: 1
    image:
      repository: veoveo/duckdb-mcp
      tag: 0.1.0
      digest: ""
    port: 8791
    healthPath: /duckdb/healthz
    args:
      - --port
      - "8791"
      - --allowed-host
      - duckdb-mcp:8791
      - --database-dir
      - /var/lib/veoveo/duckdb/databases
      - --exchange-dir
      - /var/lib/veoveo/duckdb/exchange
      - --spill-dir
      - /var/lib/veoveo/duckdb/spill
      - --spatial-extension
      - /usr/local/lib/duckdb/extensions/spatial.duckdb_extension
      - --artifact-service-url
      - http://artifact-service:8790
      - --max-artifact-bytes
      - "536870912"
    duckdbSandbox: true
    persistence:
      size: 20Gi
      storageClass: ""
      accessModes: [ReadWriteOnce]
  - name: chart-mcp
    image:
      repository: veoveo/chart-mcp
      tag: 0.1.0
      digest: ""
    port: 8795
    healthPath: /health
    platformStore: false
    args:
      - --transport
      - http
      - --host
      - 0.0.0.0
      - --port
      - "8795"
      - --path
      - /mcp
      - --allowed-hosts
      - chart-mcp:8795
      - --disable-file-reference
  - name: rerun-bridge
    image:
      repository: veoveo/mcp-stdio-bridge
      tag: 0.1.0
      digest: ""
    port: 8790
    healthPath: /healthz
    platformStore: false
    args:
      - --listen
      - 0.0.0.0:8790
      - --allowed-host
      - rerun-bridge:8790
      - --
      - rerun
      - viewer-mcp

telemetry:
  enabled: true
  image:
    repository: otel/opentelemetry-collector
    tag: 0.156.0
    digest: ""
  existingConfigMap: veoveo-otel-collector
  configKey: config.yaml
  credentialExistingSecret: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  className: ""
  annotations: {}
  # The /s path is rendered as a separate Ingress so bearer URLs never enter
  # ingress access logs. Replace this annotation for non-ingress-nginx classes.
  publicShareAnnotations:
    nginx.ingress.kubernetes.io/enable-access-log: "false"
  host: veoveo.enterprise.example
  objectStoreHost: objects.enterprise.example
  tls:
    enabled: true
    secretName: veoveo-ingress-tls

networkPolicy:
  enabled: true
  dnsNamespaceSelector:
    kubernetes.io/metadata.name: kube-system
  externalEgressCidrs: []

podDisruptionBudget:
  enabled: true
  minAvailable: 1
