# Disposable credentials for the loopback-only k3d development cluster.
# Never apply this manifest to a shared or production cluster.
apiVersion: v1
kind: Namespace
metadata:
  name: veoveo
---
apiVersion: v1
kind: Secret
metadata:
  name: veoveo-surreal-admin
  namespace: veoveo
type: Opaque
stringData:
  username: root
  password: admin-secret
