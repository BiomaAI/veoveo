[package]
name = "veoveo-artifact-service"
version.workspace = true
edition.workspace = true

[lib]
name = "veoveo_artifact_service"
path = "src/lib.rs"

[[bin]]
# Distinct from the domain servers' `server` bin so both can coexist in one
# `target/debug` (e.g. the smoke harness runs media + artifact-service together).
name = "artifact-service"
path = "src/bin/server.rs"

[dependencies]
anyhow.workspace = true
axum.workspace = true
base64.workspace = true
chrono.workspace = true
dotenvy.workspace = true
futures.workspace = true
getrandom.workspace = true
hex.workspace = true
object_store = { workspace = true, features = ["fs"] }
secrecy.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
tokio = { workspace = true, features = ["full"] }
tracing.workspace = true
tracing-subscriber.workspace = true
url.workspace = true
uuid = { workspace = true, features = ["v5"] }
veoveo-mcp-contract = { workspace = true, default-features = false }
veoveo-platform-store = { path = "../../store" }

[dev-dependencies]
reqwest = { workspace = true, features = ["rustls-no-provider", "json"] }
tempfile = "3"
veoveo-artifact-client = { path = "../client" }
