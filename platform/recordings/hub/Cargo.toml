[package]
name = "veoveo-recording-hub"
version.workspace = true
edition.workspace = true

[lib]
name = "veoveo_recording_hub"
path = "src/lib.rs"

[[bin]]
name = "spooler"
path = "src/bin/spooler.rs"

[[bin]]
name = "sensor-sim"
path = "src/bin/sensor_sim.rs"

[[bin]]
name = "hub-query"
path = "src/bin/hub_query.rs"

[[bin]]
name = "hub-smoke"
path = "src/bin/hub_smoke.rs"

[dependencies]
anyhow.workspace = true
chrono.workspace = true
clap.workspace = true
hex.workspace = true
h264-reader.workspace = true
mp4.workspace = true
serde.workspace = true
serde_json.workspace = true
secrecy.workspace = true
sha2.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "sync", "time", "fs"] }
tracing.workspace = true
tracing-subscriber.workspace = true
uuid.workspace = true
veoveo-platform-store.workspace = true
tempfile = "3"

re_sdk.workspace = true
re_sdk_types.workspace = true
re_build_info.workspace = true
re_grpc_server.workspace = true
re_grpc_client.workspace = true
re_log_channel.workspace = true
re_log_encoding.workspace = true
re_log_types.workspace = true
re_uri.workspace = true
re_dataframe.workspace = true
re_chunk_store.workspace = true

[dev-dependencies]
base64.workspace = true
