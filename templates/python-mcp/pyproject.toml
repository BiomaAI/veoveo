[project]
name = "datasheet-mcp"
version = "0.1.0"
description = "Veoveo dataset profiling MCP server — the Python hosted-server template"
requires-python = ">=3.12"
dependencies = [
    "veoveo-mcp",
    "mcp>=1.16",
    "pydantic>=2.8",
    "pandas>=2.2",
    "pyarrow>=17",
    "uvicorn>=0.30",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.24"]

[project.scripts]
datasheet-mcp = "datasheet_mcp.server.main:main"

[tool.uv.sources]
veoveo-mcp = { path = "../../python/veoveo-mcp", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/datasheet_mcp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
