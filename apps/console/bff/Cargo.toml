[package]
name = "veoveo-console-bff"
version.workspace = true
edition.workspace = true

[[bin]]
name = "console-bff"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
axum.workspace = true
base64.workspace = true
chacha20poly1305.workspace = true
chrono.workspace = true
dotenvy.workspace = true
futures.workspace = true
getrandom.workspace = true
reqwest = { workspace = true, features = ["form", "json", "rustls-no-provider", "stream"] }
rustls.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
tokio = { workspace = true, features = ["full"] }
tower-http = { workspace = true, features = ["set-header"] }
tracing.workspace = true
url.workspace = true
rmcp = { workspace = true, features = ["client", "transport-streamable-http-client-reqwest", "reqwest-tls-no-provider"] }
veoveo-mcp-apps-extension = { path = "../../../mcp/apps-extension" }
veoveo-mcp-contract = { workspace = true }
veoveo-mcp-task-extension = { path = "../../../mcp/task-extension" }
